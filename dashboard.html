<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:500px; margin:auto; padding:20px; }
.card { background:white; padding:20px; border-radius:15px; margin-bottom:20px; }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; }
.btn-primary { background:#6a0dad; color:white; }
.btn-danger { background:red; color:white; }
.promo { background:#f3e8ff; padding:10px; margin-top:10px; border-radius:10px; }
.timer { color:red; }
.log { background:black; color:#0f0; padding:10px; display:none; }
</style>

</head>

<body>

<div class="container">

<div class="card">
<h3>👥 Clientes</h3>
<div id="clientes"></div>
</div>

<div class="card">
<h3>🚀 Nueva Promo</h3>
<input id="titulo" placeholder="Título">
<textarea id="desc"></textarea>
<input id="duracion" type="number" value="3600">
<button onclick="enviarPush()" class="btn-primary">Enviar</button>
</div>

<div class="card">
<h3>🔥 Promos</h3>
<div id="promos"></div>
</div>

<div class="card">
<button onclick="toggleLog()">Mostrar Log</button>
<div id="log" class="log"></div>
</div>

</div>

<script>

// LOG
function log(t){ document.getElementById("log").innerHTML += t+"<br>"; }

function toggleLog(){
  let l=document.getElementById("log");
  l.style.display=l.style.display==="none"?"block":"none";
}

// CLIENTES
async function clientes(){
  let r=await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json");
  let d=await r.json();
  document.getElementById("clientes").innerText = d?Object.keys(d).length+" clientes":"0";
}
clientes();

// ENVIAR PUSH
async function enviarPush(){

  let titulo=document.getElementById("titulo").value;
  let desc=document.getElementById("desc").value;
  let dur=document.getElementById("duracion").value;

  let exp=Date.now()+(dur*1000);

  let link="https://fidelidade-app-akcn.vercel.app/?exp="+exp;

  log("Enviando...");

  let r=await fetch("/api/sendPush",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({titulo,desc,link})
  });

  let d=await r.json();
  log(JSON.stringify(d));

  if(r.ok){
    alert("Enviado!");
    carregarPromos();
  }

}

// PROMOS
async function carregarPromos(){

  let r=await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
  let d=await r.json();

  let box=document.getElementById("promos");
  box.innerHTML="";

  if(!d) return;

  Object.entries(d).forEach(([id,p])=>{

    if(!p.exp) return;

    let rest=p.exp-Date.now();
    if(rest<=0) return;

    let div=document.createElement("div");
    div.className="promo";

    div.innerHTML=`
      <b>${p.titulo}</b><br>
      ${p.desc}<br>
      ⏳ <span id="t_${id}"></span>
      <button class="btn-danger" onclick="del('${id}')">Eliminar</button>
    `;

    box.appendChild(div);

    timer(id,p.exp);

  });

}
carregarPromos();

// TIMER
function timer(id,exp){

  let el=document.getElementById("t_"+id);

  let i=setInterval(()=>{
    let r=exp-Date.now();
    if(r<=0){ el.innerText="Expirado"; clearInterval(i); return; }

    let s=Math.floor(r/1000);
    let m=Math.floor(s/60);
    let h=Math.floor(m/60);

    el.innerText=h+"h "+(m%60)+"m "+(s%60)+"s";

  },1000);

}

// DELETE
async function del(id){
  await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos/${id}.json`,{method:"DELETE"});
  carregarPromos();
}

</script>

</body>
</html>

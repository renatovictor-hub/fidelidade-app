<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Uai Sô</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  color: #6a0dad;
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: #6a0dad;
  color: white;
}

.preview {
  margin-top: 15px;
  padding: 15px;
  background: #f3e8ff;
  border-radius: 10px;
}

.log {
  margin-top: 15px;
  font-size: 12px;
  background: black;
  color: #00ff88;
  padding: 10px;
  border-radius: 10px;
  height: 150px;
  overflow-y: auto;
}
</style>

</head>

<body>

<div class="container">

  <h1>📲 Dashboard Promos</h1>

  <div class="card">

    <label>Título</label>
    <input id="titulo" placeholder="Ej: 2x1 en pizzas 🍕">

    <label>Descripción</label>
    <textarea id="desc" placeholder="Ej: Solo hoy hasta las 10pm"></textarea>

    <label>Duración (segundos)</label>
    <input id="duracion" type="number" value="86400">

    <button onclick="previewPromo()" class="btn-primary">
      👁 Ver Preview
    </button>

    <div id="previewBox" class="preview" style="display:none;"></div>

    <button onclick="enviarPush()" class="btn-primary">
      🚀 Enviar Push
    </button>

    <div id="log" class="log"></div>

  </div>

</div>

<script>

function log(msg) {
  document.getElementById("log").innerHTML += msg + "<br>";
}

// ================= PREVIEW =================
function previewPromo() {

  const titulo = document.getElementById("titulo").value;
  const desc = document.getElementById("desc").value;

  const box = document.getElementById("previewBox");

  box.style.display = "block";
  box.innerHTML = `
    <b>${titulo}</b><br>
    ${desc}
  `;
}

// ================= ENVIAR PUSH =================
async function enviarPush() {

  const titulo = document.getElementById("titulo").value;
  const desc = document.getElementById("desc").value;
  const duracion = document.getElementById("duracion").value;

  if (!titulo || !desc) {
    alert("Completa título y descripción");
    return;
  }

  const expires = Date.now() + (duracion * 1000);

  const link = "https://fidelidade-app-akcn.vercel.app/?promo="
    + encodeURIComponent(titulo)
    + "&desc=" + encodeURIComponent(desc)
    + "&exp=" + expires;

  log("📤 Enviando...");
  log("Título: " + titulo);
  log("Desc: " + desc);
  log("Link: " + link);

  try {

    const res = await fetch("/api/sendPush", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        titulo,
        desc,
        link
      })
    });

    const data = await res.json();

    log("📥 Respuesta:");
    log(JSON.stringify(data));

    if (res.ok) {
      alert("✅ Push enviado!");
    } else {
      alert("❌ Error al enviar");
    }

  } catch (e) {
    log("❌ Error: " + e.message);
    alert("Error conexión");
  }

}

</script>

</body>
</html>

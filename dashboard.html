<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Fidelidad</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
  color: #6a0dad;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  background: #6a0dad;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #5800b3;
}

.log {
  margin-top: 20px;
  background: #000;
  color: #0f0;
  padding: 10px;
  font-size: 12px;
  height: 150px;
  overflow-y: auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Panel de Promociones</h1>

<input id="titulo" placeholder="Título de la promo">
<textarea id="desc" placeholder="Descripción"></textarea>

<button onclick="procesarPromo()">🔥 Enviar Promo + Push</button>

<div class="log" id="log"></div>

</div>

<script>
function log(msg) {
  const logBox = document.getElementById("log");
  logBox.innerHTML += msg + "<br>";
  logBox.scrollTop = logBox.scrollHeight;
}

async function procesarPromo() {

  const titulo = document.getElementById("titulo").value;
  const desc = document.getElementById("desc").value;

  if (!titulo || !desc) {
    alert("Completa todos los campos");
    return;
  }

  const link = window.location.origin + "/?promo=" + encodeURIComponent(titulo) + "&desc=" + encodeURIComponent(desc);

  log("📤 Enviando...");
  log("Título: " + titulo);
  log("Desc: " + desc);
  log("Link: " + link);

  try {

    const res = await fetch("/api/sendPush", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        titulo,
        desc,
        link
      })
    });

    const data = await res.json();

    log("📥 Respuesta:");
    log(JSON.stringify(data));

    console.log("RESPUESTA COMPLETA:", data);

    if (res.ok) {
      alert("🚀 Push enviado!");
      log("✅ Enviado correctamente");
    } else {
      alert("❌ Error al enviar push");
      log("❌ ERROR:");
      log(JSON.stringify(data.erro || data));
    }

  } catch (e) {
    console.error(e);
    log("❌ ERROR FETCH");
  }
}
</script>

</body>
</html>

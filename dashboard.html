<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
h1 { text-align:center; color:#6a0dad; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.primary { background:#6a0dad; color:white; width:100%; }
.copy { background:#333; color:white; }
.delete { background:red; color:white; }
.push { background:#0a84ff; color:white; }

.stats { text-align:center; font-size:18px; margin-bottom:20px; }

.timer { font-weight:bold; }
</style>

</head>

<body>

<h1>📊 Dashboard PRO</h1>

<div class="stats">
🔥 Clientes activos: <span id="contador">...</span>
</div>

<div class="card">
  <h3>🚀 Crear Promoción + Enviar Push</h3>

  <input id="titulo" placeholder="🔥 Título">
  <textarea id="desc" placeholder="Descripción"></textarea>
  <input id="tempo" placeholder="Duración en segundos (ej: 3600)">

  <button class="primary" onclick="procesarPromo()">Crear + Enviar Push</button>

  <textarea id="linkGerado"></textarea>
</div>

<div id="promos"></div>

<script>

const db = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com";
const site = "https://fidelidade-app-akcn.vercel.app";

// 🔴 COLE SUA REST API KEY AQUI
const REST_API_KEY = "COLE_AQUI_SUA_KEY";
const APP_ID = "10fd0812-370f-408a-9ea5-cbb349f5d635";

// ================= CONTADOR
async function cargarContador(){
  const res = await fetch(db+"/contador.json");
  const data = await res.json();
  document.getElementById("contador").innerText = data || 0;
}

// ================= CRIAR + ENVIAR
async function procesarPromo(){

  const titulo = document.getElementById("titulo").value;
  const desc = document.getElementById("desc").value;
  const tempo = document.getElementById("tempo").value || 3600;

  const link = `${site}/?promo=${encodeURIComponent(titulo)}&desc=${encodeURIComponent(desc)}&tempo=${tempo}`;

  document.getElementById("linkGerado").value = link;

  // 🔥 ENVIA PUSH
  await fetch("https://onesignal.com/api/v1/notifications", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Basic " + REST_API_KEY
    },
    body: JSON.stringify({
      app_id: APP_ID,
      included_segments: ["All"],
      headings: { en: titulo },
      contents: { en: desc },
      url: link
    })
  });

  alert("🚀 Push enviado!");
}

// ================= FORMATAR TEMPO
function formatar(seg){
  const h=Math.floor(seg/3600);
  const m=Math.floor((seg%3600)/60);
  const s=seg%60;
  return `${h}h ${m}m ${s}s`;
}

// ================= LISTAR PROMOS
async function cargarPromos(){

  const res = await fetch(db+"/promocoes.json");
  const promos = await res.json();

  const container = document.getElementById("promos");
  container.innerHTML="";

  if(!promos) return;

  const agora = Date.now();

  Object.keys(promos).forEach(id=>{

    const p = promos[id];
    const restante = p.expiraEm - agora;
    if(restante<=0) return;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${p.titulo}</h3>
      <p>${p.descricao}</p>
      <p class="timer" id="t-${id}"></p>

      <button class="delete" onclick="eliminar('${id}')">❌ Eliminar</button>
    `;

    container.appendChild(div);

    const el = div.querySelector(`#t-${id}`);

    function atualizar(){
      const rest = p.expiraEm - Date.now();
      if(rest<=0){ div.remove(); return; }
      el.innerText = "⏳ "+formatar(Math.floor(rest/1000));
    }

    atualizar();
    setInterval(atualizar,1000);
  });
}

// ================= DELETE
async function eliminar(id){
  await fetch(db+"/promocoes/"+id+".json",{method:"DELETE"});
  cargarPromos();
}

// ================= INIT
function init(){
  cargarContador();
  cargarPromos();
}

init();
setInterval(cargarPromos,5000);

</script>

</body>
</html>

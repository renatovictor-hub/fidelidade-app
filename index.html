<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidelidad - Capilover</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(function(OneSignal) {
            OneSignal.init({
                // ATENÇÃO: Cole o seu App ID do OneSignal aqui dentro das aspas
                appId: "10fd0812-370f-408a-9ea5-cbb349f5d635", 
                safari_web_id: "web.onesignal.auto.xxxxxx",
                notifyButton: {
                    enable: false,
                },
            });
        });
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Reset e Base da Identidade Visual (Roxo, Amarelo e Branco) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #ffffff; color: #4a004a; text-align: center; padding: 20px; }
        
        /* Cabeçalho Capilover */
        .header-capy { 
            background-color: #6a0dad; /* Roxo */
            color: #ffffff; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            border: 3px solid #ffcc00; /* Amarelo */
        }
        .header-capy h1 { color: #ffcc00; }
        
        /* Botões */
        .btn-amarelo { 
            background-color: #ffcc00; 
            color: #6a0dad; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.3s;
        }
        .btn-amarelo:hover { background-color: #e6b800; }

        /* Estilos das Promos */
        #promoHeader, #expiredSection { display: none; margin-top: 30px; }
        h2 { color: #6a0dad; margin-bottom: 15px; }
        
        .promo-card { 
            background-color: #f8f0ff; 
            border-left: 5px solid #ffcc00; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            text-align: left; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .promo-card h3 { color: #6a0dad; margin-bottom: 5px; }
        
        /* Botão WhatsApp - Estilizado nas cores da marca */
        .btn-wa-promo { 
            display: inline-block; 
            background-color: #6a0dad; 
            color: #ffcc00; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 20px; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        .btn-wa-promo:hover { background-color: #4a0080; }
        
        /* Promos Expiradas */
        .expired-card { 
            background-color: #eeeeee; 
            color: #666666; 
            border-left: 5px solid #999999; 
            padding: 10px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 14px; 
        }
        
        /* Lógica de Telas (Steps) */
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>

    <div class="header-capy">
        <h1><i class="fa-solid fa-paw"></i> Capilover Promos</h1>
        <p>¡Las mejores delicias brasileñas!</p>
    </div>

    <div id="step2" class="step active">
        <h2>¡Activa las Alertas!</h2>
        <p>Recibe promociones exclusivas directo en tu celular.</p>
        <button class="btn-amarelo" onclick="ativarNotif()">Activar Alertas <i class="fa-solid fa-bell"></i></button>
    </div>

    <div id="step3" class="step">
        <h2 id="promoHeader">🔥 Promociones Activas</h2>
        <div id="promoBox"></div>

        <div id="expiredSection">
            <h2>⏳ Últimas Expiradas</h2>
            <div id="expiredBox"></div>
        </div>
    </div>

    <script>
        // 1. Lógica Corrigida de Permissão do OneSignal
        async function ativarNotif() {
            OneSignalDeferred.push(async function(OneSignal) {
                try {
                    // Dispara a janela nativa de permissão do navegador
                    await OneSignal.Notifications.requestPermission();
                    
                    // Se o código chegou aqui, avançamos a tela
                    document.getElementById("step2").classList.remove("active");
                    document.getElementById("step3").classList.add("active");
                    
                    // Carrega os dados do banco
                    carregarConteudo();
                } catch (error) {
                    console.error("Erro ao solicitar notificação:", error);
                    alert("Hubo un error. Por favor, intenta de nuevo.");
                }
            });
        }

        // 2. Lógica Corrigida de Banco de Dados e Ordenação
        async function carregarConteudo() {
            try {
                const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
                const promos = await res.json();
                
                const box = document.getElementById("promoBox");
                const expBox = document.getElementById("expiredBox");
                const header = document.getElementById("promoHeader");
                const expSection = document.getElementById("expiredSection");

                box.innerHTML = "";
                expBox.innerHTML = "";

                if (!promos) {
                    header.style.display = "none";
                    expSection.style.display = "none";
                    return;
                }

                const agora = Date.now();
                const ativas = [];
                const expiradas = [];

                Object.keys(promos).forEach(id => {
                    const p = promos[id];
                    p.exp > agora ? ativas.push(p) : expiradas.push(p);
                });

                // PROMOS ATIVAS: Da que vence mais tarde para a que vence logo
                if (ativas.length > 0) {
                    header.style.display = "block";
                    ativas.sort((a, b) => b.exp - a.exp);
                    ativas.forEach(p => {
                        const card = document.createElement("div");
                        card.className = "promo-card";
                        const msg = encodeURIComponent(`¡Hola! Soy Capilover y quiero la promo: ${p.titulo}`);
                        card.innerHTML = `<h3>${p.titulo}</h3><p>${p.desc}</p>
                            <a href="https://api.whatsapp.com/send?phone=5219986023759&text=${msg}" target="_blank" class="btn-wa-promo">
                            <i class="fab fa-whatsapp"></i> YO QUIERO</a>`;
                        box.appendChild(card);
                    });
                } else {
                    header.style.display = "none";
                }

                // PROMOS EXPIRADAS: Limite exato nas 3 mais recentes
                if (expiradas.length > 0) {
                    expSection.style.display = "block";
                    
                    // b.exp - a.exp garante a data mais recente no topo
                    expiradas.sort((a, b) => b.exp - a.exp); 
                    
                    // Extrai apenas as 3 primeiras
                    const as3Ultimas = expiradas.slice(0, 3);

                    as3Ultimas.forEach(p => {
                        const card = document.createElement("div");
                        card.className = "expired-card";
                        card.innerHTML = `<b>${p.titulo}</b><br>${p.desc}`;
                        expBox.appendChild(card);
                    });
                } else {
                    expSection.style.display = "none";
                }
            } catch (e) { 
                console.error("Erro ao processar promos:", e); 
            }
        }

        // 3. Verificação Automática ao Carregar a Página
        window.onload = function() {
            OneSignalDeferred.push(function(OneSignal) {
                // Se a pessoa já aceitou no passado, pula direto para as promos
                if (OneSignal.Notifications.hasPermission) {
                    document.getElementById("step2").classList.remove("active");
                    document.getElementById("step3").classList.add("active");
                    carregarConteudo();
                }
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uai Sô - Promociones</title>
    <style>
        :root {
            --roxo: #6a0dad;
            --amarelo: #ffcc00;
            --branco: #ffffff;
            --cinza-fundo: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cinza-fundo);
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Cabeçalho do App do Cliente */
        header {
            background-color: var(--roxo);
            color: var(--branco);
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--amarelo);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 28px; }
        header p { margin: 5px 0 0 0; font-size: 14px; color: var(--amarelo); }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Cards das Promos */
        .promo-card {
            background: var(--branco);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border-left: 6px solid var(--amarelo);
            position: relative;
        }

        .promo-title {
            color: var(--roxo);
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .promo-desc { font-size: 16px; margin-bottom: 15px; line-height: 1.4; }
        
        .timer-box {
            background: #fff8d6;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
            color: #d32f2f;
            font-size: 14px;
        }

        /* Modal do Push (Aparece quando vem da notificação) */
        #promoModal {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: var(--branco);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 5px solid var(--amarelo);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 { color: var(--roxo); margin-top: 0; }
        .modal-content p { font-size: 18px; }
        
        .btn-close {
            background: var(--roxo);
            color: var(--branco);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .empty-state { text-align: center; color: #666; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <h1>Uai Sô</h1>
        <p>¡Tus Promociones Exclusivas!</p>
    </header>

    <div id="promoModal">
        <div class="modal-content">
            <h2>🎉 ¡Oferta Especial!</h2>
            <h3 id="modalTitle" style="color: var(--roxo);"></h3>
            <p id="modalDesc"></p>
            <div class="timer-box">
                ⏳ Termina en: <span id="modalTimer">--:--:--</span>
            </div>
            <button class="btn-close" onclick="cerrarModal()">¡Lo quiero!</button>
        </div>
    </div>

    <div class="container" id="listaPromosCliente">
        <div class="empty-state">Buscando promociones fresquitas... 🥟</div>
    </div>

    <script>
        let timersAtivos = {};

        // 1. CAPTURAR DADOS DO PUSH (URL)
        const params = new URLSearchParams(window.location.search);
        const pPromo = params.get('promo');
        const pDesc = params.get('desc');
        const pExp = params.get('exp');

        // Se a URL tiver dados do push, mostra o Modal
        if (pPromo && pDesc && pExp) {
            document.getElementById('promoModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = decodeURIComponent(pPromo);
            document.getElementById('modalDesc').innerText = decodeURIComponent(pDesc);
            iniciarTimer('modalTimer', Number(pExp));
        }

        // Fechar modal e limpar a URL para não abrir de novo se atualizar a página
        function cerrarModal() {
            document.getElementById('promoModal').style.display = 'none';
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 2. CARREGAR TODAS AS PROMOS DO FIREBASE
        async function carregarPromos() {
            try {
                const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
                const data = await res.json();
                const lista = document.getElementById("listaPromosCliente");
                
                lista.innerHTML = ""; // Limpa o "Buscando..."

                if (!data) {
                    lista.innerHTML = "<div class='empty-state'>😔 No hay promociones activas en este momento.<br>¡Vuelve más tarde!</div>";
                    return;
                }

                let temPromoAtiva = false;

                Object.entries(data).forEach(([id, promo]) => {
                    if (!promo || !promo.exp) return;
                    
                    const expiraEm = Number(promo.exp);
                    if (expiraEm - Date.now() <= 0) return; // Se já passou do tempo, não mostra

                    temPromoAtiva = true;
                    
                    const div = document.createElement("div");
                    div.className = "promo-card";
                    div.innerHTML = `
                        <h3 class="promo-title">${promo.titulo}</h3>
                        <div class="promo-desc">${promo.desc}</div>
                        <div class="timer-box">
                            ⏳ Termina en: <span id="timer_${id}">--:--:--</span>
                        </div>
                    `;
                    lista.appendChild(div);
                    iniciarTimer(`timer_${id}`, expiraEm, id);
                });

                if (!temPromoAtiva) {
                    lista.innerHTML = "<div class='empty-state'>😔 No hay promociones activas en este momento.<br>¡Vuelve más tarde!</div>";
                }

            } catch (e) {
                console.error("Error al cargar promos:", e);
                document.getElementById("listaPromosCliente").innerHTML = "<div class='empty-state'>Error al conectar con el servidor.</div>";
            }
        }

        // 3. FUNÇÃO DO RELÓGIO (TIMER)
        function iniciarTimer(elementId, exp, idParaLimpar = null) {
            const el = document.getElementById(elementId);
            if (!el) return;

            const update = () => {
                const resto = exp - Date.now();
                if (resto <= 0) {
                    el.innerText = "¡Expirado!";
                    if (idParaLimpar && timersAtivos[idParaLimpar]) {
                        clearInterval(timersAtivos[idParaLimpar]);
                    }
                    return;
                }
                const s = Math.floor(resto / 1000);
                const m = Math.floor(s / 60);
                const h = Math.floor(m / 60);
                el.innerText = `${h}h ${m % 60}m ${s % 60}s`;
            };
            
            update();
            const interval = setInterval(update, 1000);
            if (idParaLimpar) timersAtivos[idParaLimpar] = interval;
        }

        // Inicia a busca no Firebase assim que a página abre
        carregarPromos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fidelidad Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>
// ==============================
// ONESIGNAL
// ==============================
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    safari_web_id: "web.onesignal.auto",
    notifyButton: { enable: false }
  });
});

// ==============================
// LER PROMOS ATIVAS DO DASHBOARD
// ==============================
async function carregarPromocao() {
  // Alterado para a mesma rota que o Dashboard usa: promos.json
  const dbUrl = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json";
  const container = document.getElementById("promoBox");
  
  try {
    const res = await fetch(dbUrl);
    const promos = await res.json();
    
    container.innerHTML = "";

    // Se a URL tiver parâmetros antigos do push, nós a limpamos para o cliente não ver links feios
    if (window.location.search) {
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    if (!promos) return;

    const agora = Date.now();
    let temPromoAtiva = false;

    Object.keys(promos).forEach(id => {
      const p = promos[id];
      
      // Verifica se a promo existe e pega o tempo que definimos no Dashboard (p.exp)
      if (!p || !p.exp) return;
      const expiraEm = Number(p.exp);

      if (expiraEm < agora) return; // Se já passou do tempo, não mostra

      temPromoAtiva = true;

      const div = document.createElement("div");
      div.className = "promo-card";

      // Usando p.desc que é o nome da variável no Dashboard
      div.innerHTML = `
        <h3 style="margin: 0 0 8px 0;">${p.titulo}</h3>
        <p style="margin: 0 0 12px 0; font-size: 15px; line-height: 1.4;">${p.desc}</p>
        <div class="timer" id="timer-${id}"></div>
      `;

      container.appendChild(div);

      const timerEl = div.querySelector(`#timer-${id}`);

      function atualizarTimer() {
        const restante = expiraEm - Date.now();

        if (restante <= 0) {
          div.remove();
          return;
        }

        const totalSeg = Math.floor(restante / 1000);
        const h = Math.floor(totalSeg / 3600);
        const m = Math.floor((totalSeg % 3600) / 60);
        const s = totalSeg % 60;

        timerEl.innerText = `⏳ Termina en: ${h}h ${m}m ${s}s`;
      }

      atualizarTimer();
      setInterval(atualizarTimer, 1000);
    });

    if (temPromoAtiva) {
      container.style.display = "block";
    }

  } catch (error) {
    console.error("Erro ao carregar promoções:", error);
  }
}

// ==============================
// INIT
// ==============================
window.onload = () => {
  carregarPromocao();
};
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

.banner {
  width: 100%;
  border-radius: 15px;
}

/* Título das Promos */
.titulo-secao {
  color: #6a0dad;
  font-size: 20px;
  margin-top: 25px;
  margin-bottom: 10px;
  font-weight: bold;
}

.promo-card {
  background: linear-gradient(135deg, #6a0dad, #9b30ff);
  color: white;
  padding: 20px;
  border-radius: 15px;
  margin-top: 15px;
  text-align: left;
  box-shadow: 0 4px 10px rgba(106, 13, 173, 0.3);
}

.timer {
  background: rgba(255,255,255,0.2);
  padding: 8px;
  border-radius: 8px;
  margin-top: 8px;
  font-weight: bold;
  font-size: 14px;
}

.links {
  margin-top: 30px;
}

.links a {
  display: block;
  margin: 15px 10px;
  font-size: 18px;
  text-decoration: none;
  color: #6a0dad;
  background: #f0f2f5;
  padding: 15px;
  border-radius: 10px;
  font-weight: bold;
}

.links a:hover {
  background: #e4e6e9;
}

.links i {
  margin-right: 8px;
  font-size: 20px;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 style="color: #6a0dad;">Programa de Fidelidad</h1>
<p style="color: #555;">Recibe promociones y platos del día</p>

<img src="banner.jpg" class="banner">

<div id="promoBox" style="display:none;"></div>

<div class="links">
<a href="https://api.whatsapp.com/send?phone=5219986023759">
<i class="fab fa-whatsapp" style="color: #25D366;"></i> WhatsApp
</a>

<a href="https://www.instagram.com/fooduaiso">
<i class="fab fa-instagram" style="color: #E1306C;"></i> Instagram
</a>

<a href="https://uaisocancun.ola.click/products">
<i class="fas fa-utensils"></i> Ver menú
</a>
</div>

</div>
<script>

// ==============================
// GERAR ID ÚNICO
// ==============================
let userId = localStorage.getItem("user_id");

if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 1000000000);
  localStorage.setItem("user_id", userId);
}

// ==============================
// LOGIN ONESIGNAL
// ==============================
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.login(userId);
});

// ==============================
// VERIFICAR SE JÁ FOI SALVO
// ==============================
let jaSalvo = localStorage.getItem("user_saved");

// ==============================
// SALVAR SÓ UMA VEZ
// ==============================
async function salvarUsuario() {

  if (jaSalvo === "true") {
    console.log("Usuario já salvo:", userId);
    return;
  }

  try {

    await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json", {
      method: "POST",
      body: JSON.stringify({
        user_id: userId,
        created_at: Date.now()
      })
    });

    localStorage.setItem("user_saved", "true");

    console.log("Usuario salvo:", userId);

  } catch (e) {
    console.error("Erro ao salvar:", e);
  }

}

salvarUsuario();

</script>

</body>
</html>

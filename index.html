<!-- 🔥 ADICIONADO: HEADER DE PROMOS -->
<h3 id="promoHeader" style="display:none;color:#6a0dad;margin-top:20px;">
🔥 Promociones Activas
</h3>

<div id="promoBox"></div>

<div id="expiredSection" style="display:none;">
    <p style="color:#999;">⏳ Anteriores</p>
    <div id="expiredBox"></div>
</div>

<!-- 🔥 CONTADOR BONITO -->
<div id="contador" style="
background:#f3e8ff;
padding:12px;
border-radius:12px;
margin-top:15px;
font-weight:bold;
color:#6a0dad;">
🔥 +300 clientes conectados
</div>

<!-- 🔥 BOTÕES MODERNOS -->
<div style="margin-top:25px;display:flex;gap:10px;">
    <a href="https://api.whatsapp.com/send?phone=5219986023759"
       style="flex:1;background:#25d366;color:white;padding:12px;border-radius:10px;text-decoration:none;">
       WhatsApp
    </a>
    <a href="https://www.instagram.com/fooduaiso"
       style="flex:1;background:#E1306C;color:white;padding:12px;border-radius:10px;text-decoration:none;">
       Instagram
    </a>
</div>

<a href="https://uaisocancun.ola.click/products"
   style="display:block;margin-top:10px;background:#000;color:white;padding:12px;border-radius:10px;text-decoration:none;">
   Ver Menú
</a>

<script>
// ================= CONTADOR DINÂMICO =================
async function atualizarContador(){
    const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json");
    const data = await res.json();
    const total = data ? Object.keys(data).length : 0;

    document.getElementById("contador").innerHTML =
        `🔥 +${300 + total} clientes conectados`;
}

// ================= TIMER =================
function formatTime(ms){
    const s = Math.floor(ms/1000)%60;
    const m = Math.floor(ms/60000)%60;
    const h = Math.floor(ms/3600000);
    return `${h}h ${m}m ${s}s`;
}

// ================= PROMOS =================
async function carregarPromos(){
    const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
    const data = await res.json();

    const box = document.getElementById("promoBox");
    const expBox = document.getElementById("expiredBox");

    box.innerHTML="";
    expBox.innerHTML="";

    if(!data) return;

    const agora = Date.now();

    const ativas = [];
    const expiradas = [];

    Object.values(data).forEach(p=>{
        if(p.exp > agora) ativas.push(p);
        else expiradas.push(p);
    });

    // ===== ATIVAS =====
    if(ativas.length){
        document.getElementById("promoHeader").style.display="block";

        ativas.sort((a,b)=>b.exp-a.exp);

        ativas.forEach(p=>{
            const card = document.createElement("div");
            card.className="promo-card";

            const tempoRestante = p.exp - agora;

            card.innerHTML=`
                <h3>${p.titulo}</h3>
                <p>${p.desc}</p>
                <div style="margin-top:10px;font-weight:bold;">
                    ⏳ ${formatTime(tempoRestante)}
                </div>
                <a href="https://api.whatsapp.com/send?phone=5219986023759&text=Quiero:${encodeURIComponent(p.titulo)}"
                   class="btn-whats">
                   LO QUIERO
                </a>
            `;

            box.appendChild(card);
        });
    }

    // ===== EXPIRADAS =====
    if(expiradas.length){
        document.getElementById("expiredSection").style.display="block";

        expiradas.sort((a,b)=>b.exp-a.exp)
        .slice(0,3)
        .forEach(p=>{
            const card=document.createElement("div");
            card.className="expired-card";
            card.innerHTML=`<b>${p.titulo}</b><br>Finalizada`;
            expBox.appendChild(card);
        });
    }
}

// ================= LOOP =================
setInterval(()=>{
    carregarPromos();
    atualizarContador();
},10000);

</script>

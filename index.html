<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fidelidad Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>
// ==============================
// DETECÇÃO
// ==============================
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isInAppBrowser = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);

// ==============================
// OVERLAY iPhone (WhatsApp)
// ==============================
if (isIOS && isInAppBrowser) {
  document.addEventListener("DOMContentLoaded", function() {

    const overlay = document.createElement("div");

    overlay.innerHTML = `
      <div style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:white;
        z-index:9999;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        padding:30px;
        text-align:center;
        font-family:sans-serif;
      ">
        <h2>📲 Abrir en Safari</h2>

        <p>
          Para activar promociones,<br>
          abre esta página en Safari
        </p>

        <br>

        <button onclick="abrirSafari()" style="
          padding:15px;
          font-size:18px;
          background:#6a0dad;
          color:white;
          border:none;
          border-radius:10px;
        ">
          👉 Abrir en Safari
        </button>

        <br><br>

        <p style="font-size:14px; color:gray;">
          Si no funciona:<br>
          toca (…) y selecciona<br>
          <b>"Abrir en Safari"</b>
        </p>
      </div>
    `;

    document.body.appendChild(overlay);
  });

  function abrirSafari() {
    window.location.href = window.location.href;
  }
}

// ==============================
// ONESIGNAL
// ==============================
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    safari_web_id: "web.onesignal.auto",
    notifyButton: { enable: false }
  });
});

// ==============================
// ATIVAR NOTIFICAÇÃO
// ==============================
async function ativarNotificacoes() {
  const OneSignal = window.OneSignal;

  await OneSignal.Notifications.requestPermission();

  setTimeout(async () => {
    const subId = await OneSignal.User.PushSubscription.id;

    if (subId) {
      alert("¡Promociones activadas! 🔔");

      localStorage.setItem("push_ativo", "true");
      document.getElementById("btnAtivar").style.display = "none";

    } else {
      alert("Error al activar 😢");
    }
  }, 2000);
}

// ==============================
// INSTALAÇÃO ANDROID
// ==============================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById("btnInstalar").style.display = "block";
});

function instalarApp() {
  if (isIOS) {
    alert("Toca compartir ⬆️ y luego 'Agregar a pantalla de inicio'");
    return;
  }

  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
}

// ==============================
// CONTROLE DE BOTÕES
// ==============================
window.onload = () => {

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  const jaAtivo = localStorage.getItem("push_ativo");

  // já ativou
  if (jaAtivo === "true") {
    document.getElementById("btnAtivar").style.display = "none";
  }

  // iPhone sempre mostra instalar
  if (isIOS && !isStandalone) {
    document.getElementById("btnInstalar").style.display = "block";
    return;
  }

  // Android
  if (!isStandalone) {
    document.getElementById("btnInstalar").style.display = "block";
  } else {
    if (jaAtivo !== "true") {
      document.getElementById("btnAtivar").style.display = "block";
    }
  }
};
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

h1 {
  color: #6a0dad;
}

.contador {
  background: #f3e8ff;
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
  color: #6a0dad;
  font-weight: bold;
}

.banner {
  width: 100%;
  border-radius: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: #6a0dad;
  color: white;
}

.urgencia {
  color: red;
  margin-top: 10px;
  font-weight: bold;
}

.links a {
  display: block;
  margin: 5px;
  color: #6a0dad;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Programa de Fidelidad</h1>
<p>Recibe promociones y platos del día</p>

<div class="contador">
🔥 +327 clientes ya reciben promociones
</div>

<img src="banner.jpg" class="banner">

<button id="btnInstalar" class="btn-primary" onclick="instalarApp()" style="display:none;">
📲 Instalar App
</button>

<button id="btnAtivar" class="btn-primary" onclick="ativarNotificacoes()" style="display:none;">
🔔 Activar Promociones
</button>

<div class="urgencia">
⚡ Promociones desaparecen en pocas horas
</div>

<div class="links">
<a href="https://api.whatsapp.com/send?phone=5219986023759">📲 WhatsApp</a>
<a href="https://www.instagram.com/fooduaiso">📸 Instagram</a>
<a href="https://uaisocancun.ola.click/products">📋 Ver menú</a>
</div>

</div>

</body>
</html>

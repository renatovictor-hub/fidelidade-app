<!DOCTYPE html>
<html lang="es">
<head>
    
<meta charset="UTF-8">
<title>Uai Sô Fidelidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
// 🔥 FIX ONESIGNAL
let OneSignalInstance = null;

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {

  OneSignalInstance = OneSignal;

  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    safari_web_id: "web.onesignal.auto",
    notifyButton: { enable: false }
  });

});
</script>

<style>
:root { --roxo:#6a0dad; --amarelo:#ffcc00; --gradiente:linear-gradient(135deg,#6a0dad,#9b30ff);}
body { margin:0;font-family:'Segoe UI';text-align:center;background:#fff;}
.container { max-width:400px;margin:auto;padding:20px;}

.step-box { display:none;padding:20px;border-radius:20px;background:#fff;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.active { display:block;}

button { width:100%;padding:15px;margin-top:10px;border:none;border-radius:12px;font-weight:bold;}
.btn-next { background:var(--gradiente);color:#fff;}
.btn-notif { background:var(--amarelo);color:#000;}

.promo-card { background:var(--gradiente);color:#fff;padding:15px;border-radius:15px;margin-top:10px;text-align:left;}
</style>

</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="step-box">
<h2>📲 Instalar App</h2>
<button onclick="instalar()" class="btn-next">Instalar</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step-box">
<h2>🔔 Activar Notificaciones</h2>
<button onclick="ativarNotif()" class="btn-notif">Activar</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step-box">
<h2>👤 Tu Nombre</h2>
<input id="nomeInput" placeholder="Tu nombre" style="width:100%;padding:10px;">
<button onclick="salvarNome()" class="btn-next">Continuar</button>
</div>

<!-- APP -->
<div id="mainApp" style="display:none;">
<h2 id="welcome"></h2>
<div id="promoBox"></div>
</div>

</div>

<script>

// ================= USER ID FIXO =================
let userId = localStorage.getItem("user_id");

if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 1000000000);
  localStorage.setItem("user_id", userId);
}

// ================= FLOW =================
window.onload = () => {

  const nome = localStorage.getItem("nome_usuario");
  const push = localStorage.getItem("push_ativo");

  if (nome) {
    mostrarApp();
  } else if (push) {
    show("step3");
  } else {
    show("step1");
  }

};

function show(id){
  document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ================= INSTALAR =================
function instalar(){
  show("step2");
}

// ================= NOTIF (CORRIGIDO) =================
async function ativarNotif(){

  if (!OneSignalInstance){
    alert("Cargando sistema...");
    return;
  }

  const perm = await OneSignalInstance.Notifications.requestPermission();

  if (perm === "granted"){
    localStorage.setItem("push_ativo","true");
    show("step3");
  } else {
    alert("Permiso denegado");
  }

}

// ================= SALVAR NOME =================
async function salvarNome(){

  const nome = document.getElementById("nomeInput").value;

  if (!nome) return alert("Digite seu nome");

  // 🔥 LOGIN NO ONESIGNAL COM ID FIXO
  if (OneSignalInstance){
    await OneSignalInstance.login(userId);
  }

  await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users/${userId}.json`,{
    method:"PUT",
    body:JSON.stringify({
      user_id:userId,
      nombre:nome,
      created_at:Date.now()
    })
  });

  localStorage.setItem("nome_usuario",nome);

  mostrarApp();
}

// ================= APP =================
function mostrarApp(){

  document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
  document.getElementById("mainApp").style.display="block";

  document.getElementById("welcome").innerText =
    "👋 Hola " + localStorage.getItem("nome_usuario");

  carregarPromos();
}

// ================= PROMOS =================
async function carregarPromos(){

  const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
  const data = await res.json();

  const box = document.getElementById("promoBox");
  box.innerHTML="";

  if(!data) return;

  Object.values(data).forEach(p=>{

    if(!p.exp) return;

    const restante = p.exp - Date.now();
    if(restante <= 0) return;

    const div = document.createElement("div");
    div.className="promo-card";

    div.innerHTML = `
      <h3>${p.titulo}</h3>
      <p>${p.desc}</p>
    `;

    box.appendChild(div);

  });

}

</script>

</body>
</html>

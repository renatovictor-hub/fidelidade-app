<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Uai Sô Fidelidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<style>
body { font-family: Arial; text-align:center; margin:0; }
.container { max-width:400px; margin:auto; padding:20px; }
.step { display:none; }
.active { display:block; }
button { width:100%; padding:15px; margin-top:10px; border:none; border-radius:10px; }
.promo { background:#f3e8ff; padding:10px; margin-top:10px; border-radius:10px; }
</style>

</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="step">
<h2>Instalar App</h2>
<button onclick="instalar()">Instalar</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<h2>Ativar Notificações</h2>
<button onclick="ativarNotif()">Ativar</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<h2>Seu Nome</h2>
<input id="nomeInput" placeholder="Seu nome">
<button onclick="salvarNome()">Continuar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<h2 id="welcome"></h2>
<div id="promoBox"></div>
</div>

</div>

<script>

// ================= USER ID FIXO =================
let userId = localStorage.getItem("user_id");

if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 1000000000);
  localStorage.setItem("user_id", userId);
}

// ================= ONESIGNAL =================
let OneSignalInstance = null;

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {

  OneSignalInstance = OneSignal;

  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    notifyButton: { enable: false }
  });

  // login automático SEMPRE
  await OneSignal.login(userId);

});

// ================= STEPS =================
window.onload = () => {

  const nome = localStorage.getItem("nome_usuario");
  const push = localStorage.getItem("push_ativo");

  if (nome) {
    mostrarApp();
  } else if (push) {
    show("step3");
  } else {
    show("step2");
  }

};

function show(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ================= INSTALAR =================
function instalar() {
  alert("Use menu do navegador para instalar");
}

// ================= NOTIFICAÇÃO =================
async function ativarNotif() {

  if (!OneSignalInstance) {
    alert("Carregando notificações...");
    return;
  }

  const perm = await OneSignalInstance.Notifications.requestPermission();

  if (perm === "granted") {
    localStorage.setItem("push_ativo", "true");
    show("step3");
  } else {
    alert("Permissão negada");
  }
}

// ================= SALVAR NOME =================
async function salvarNome() {

  const nome = document.getElementById("nomeInput").value;

  if (!nome) {
    alert("Digite seu nome");
    return;
  }

  // 🔥 SALVA NO FIREBASE COM MESMO ID
  await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users/${userId}.json`, {
    method: "PUT",
    body: JSON.stringify({
      user_id: userId,
      nombre: nome,
      created_at: Date.now()
    })
  });

  localStorage.setItem("nome_usuario", nome);

  mostrarApp();
}

// ================= APP =================
function mostrarApp() {

  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText =
    "Hola, " + localStorage.getItem("nome_usuario");

  carregarPromos();
}

// ================= PROMOS =================
async function carregarPromos() {

  const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
  const data = await res.json();

  const box = document.getElementById("promoBox");
  box.innerHTML = "";

  if (!data) return;

  Object.values(data).forEach(p => {

    if (!p.exp) return;

    const restante = p.exp - Date.now();
    if (restante <= 0) return;

    const div = document.createElement("div");
    div.className = "promo";

    div.innerHTML = `
      <b>${p.titulo}</b><br>
      ${p.desc}<br>
      ⏳ <span>${formatarTempo(restante)}</span>
    `;

    box.appendChild(div);

  });

}

// ================= TIMER =================
function formatarTempo(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  return h + "h " + (m % 60) + "m " + (s % 60) + "s";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Uai Sô Fidelidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
// ================= SERVICE WORKER =================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// ================= ONESIGNAL =================
let OneSignalInstance = null;

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {

  OneSignalInstance = OneSignal;

  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    notifyButton: { enable: false },
    serviceWorkerPath: "/OneSignalSDKWorker.js",
    serviceWorkerUpdaterPath: "/OneSignalSDKUpdaterWorker.js"
  });

});
</script>

<style>
:root { --roxo:#6a0dad; --amarelo:#ffcc00; }
body { margin:0;font-family:sans-serif;text-align:center;}
.container { max-width:400px;margin:auto;padding:20px;}

.step { display:none; }
.active { display:block; }

button { width:100%;padding:15px;margin-top:15px;border:none;border-radius:10px;font-weight:bold;}
.btn1 { background:#6a0dad;color:#fff; }
.btn2 { background:#ffcc00; }

.card { background:#6a0dad;color:#fff;padding:15px;border-radius:15px;margin-top:10px;text-align:left;}
</style>

</head>

<body>

<div class="container">

<div id="installStep" class="step">
<h2>Instalar App</h2>
<button onclick="instalar()" class="btn1">INSTALAR</button>
</div>

<div id="notifStep" class="step">
<h2>Ativar Notificações</h2>
<button onclick="ativarNotif()" class="btn2">ATIVAR</button>
</div>

<div id="nomeStep" class="step">
<h2>Seu Nome</h2>
<input id="nome" placeholder="Nome" style="width:100%;padding:10px;">
<button onclick="salvar()" class="btn1">CONTINUAR</button>
</div>

<div id="app" style="display:none;">
<h2 id="hello"></h2>
<div id="promos"></div>
</div>

</div>

<script>

// ================= USER FIXO =================
let userId = localStorage.getItem("uid");

if (!userId) {
  userId = "user_" + Math.floor(Math.random()*1e9);
  localStorage.setItem("uid", userId);
}

// ================= INSTALL =================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  show("installStep");
});

async function instalar(){
  if (!deferredPrompt) {
    alert("Use menu do navegador");
    return;
  }

  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    show("notifStep");
  }
}

// ================= FLOW =================
window.onload = () => {

  const nome = localStorage.getItem("nome");

  if (nome) abrirApp();
};

// ================= NOTIF =================
async function ativarNotif(){

  const perm = await OneSignalInstance.Notifications.requestPermission();

  if (perm === "granted") {
    show("nomeStep");
  } else {
    alert("Permissão negada");
  }
}

// ================= SALVAR =================
async function salvar(){

  const nome = document.getElementById("nome").value;

  await OneSignalInstance.login(userId);

  await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users/${userId}.json`,{
    method:"PUT",
    body:JSON.stringify({
      nome,
      user_id:userId
    })
  });

  localStorage.setItem("nome", nome);

  abrirApp();
}

// ================= APP =================
function abrirApp(){
  document.querySelectorAll(".step").forEach(e=>e.style.display="none");
  document.getElementById("app").style.display="block";

  document.getElementById("hello").innerText =
    "Hola " + localStorage.getItem("nome");

  carregar();
}

// ================= PROMOS =================
async function carregar(){

  const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
  const data = await res.json();

  const box = document.getElementById("promos");
  box.innerHTML="";

  if(!data) return;

  Object.values(data).forEach(p=>{

    if(p.exp < Date.now()) return;

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`<b>${p.titulo}</b><br>${p.desc}`;
    box.appendChild(div);

  });
}

// ================= UTILS =================
function show(id){
  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Uai Sô Fidelidad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
                safari_web_id: "web.onesignal.auto",
                notifyButton: { enable: false }
            });
        });
    </script>

    <style>
        :root { --roxo:#6a0dad; --amarelo:#ffcc00; --gradiente:linear-gradient(135deg,#6a0dad,#9b30ff); }
        body { margin:0; font-family:'Segoe UI',Roboto,sans-serif; background:#fff; text-align:center; color:#333; }
        .container { max-width:400px; margin:auto; padding:20px; }
        
        .header-app { display:flex; justify-content:space-between; align-items:center; padding:10px 0; }
        .logo { width:80px; }
        .btn-refresh { background:none; border:none; color:var(--roxo); font-size:24px; cursor:pointer; }

        .step-box { display:none; padding:25px; border-radius:20px; background:#fff; border:2px solid #eee; box-shadow:0 10px 25px rgba(0,0,0,0.05); }
        .active { display:block; }

        button { width:100%; padding:16px; margin-top:15px; border-radius:12px; border:none; font-weight:bold; cursor:pointer; font-size: 16px; }
        .btn-next { background:var(--gradiente); color:#fff; }
        .btn-notif { background:var(--amarelo); color:#000; }
        .btn-whats { background:#25d366; color:#fff; text-decoration:none; display:block; padding:12px; border-radius:10px; margin-top:10px; }

        .promo-card { background:var(--gradiente); color:white; padding:18px; border-radius:18px; margin-bottom:15px; text-align:left; }
        .expired-section { margin-top:30px; border-top:1px solid #eee; padding-top:20px; }
        .expired-card { background:#f5f5f5; color:#777; padding:12px; border-radius:12px; margin-bottom:10px; text-align:left; font-size:14px; }
    </style>
</head>

<body>
<div class="container">

    <div class="header-app">
        <img src="logo.png" class="logo" alt="Logo">
        <button onclick="location.reload()" class="btn-refresh" id="refreshBtn" style="display:none;">↻</button>
    </div>

    <div id="step1" class="step-box active">
        <h2>Instalar App</h2>
        <p>Para una mejor experiencia, instala nuestra App en tu pantalla de inicio.</p>
        <button onclick="show('step2')" class="btn-next">CONTINUAR</button>
    </div>

    <div id="step2" class="step-box">
        <h2>Activar Notificaciones</h2>
        <p>Recibe nuestras mejores promociones directo en tu celular.</p>
        <button onclick="ativarNotif()" class="btn-notif">ACTIVAR ALERTAS</button>
    </div>

    <div id="step3" class="step-box">
        <h2>¿Cómo te llamas?</h2>
        <input id="nomeInput" placeholder="Tu nombre" style="width:100%; padding:14px; border-radius:10px; border:1px solid #ccc; font-size:16px;">
        <button onclick="salvarNome()" class="btn-next">ENTRAR</button>
    </div>

    <div id="mainApp" style="display:none;">
        <h2 id="userGreeting" style="color:var(--roxo)"></h2>
        <div id="promoBox"></div>
        
        <div id="expiredContainer" class="expired-section" style="display:none;">
            <h3 style="color:#999">Últimas delicias</h3>
            <div id="expiredBox"></div>
        </div>
    </div>

</div>

<script>
let userId = localStorage.getItem("user_id") || "user_" + Math.floor(Math.random() * 1000000000);
localStorage.setItem("user_id", userId);

window.onload = () => {
    const nome = localStorage.getItem("nome_usuario");
    const push = localStorage.getItem("push_ativo");

    if (nome) showMainApp();
    else if (push) show("step3");
};

function show(id){
    document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

async function ativarNotif(){
    OneSignalDeferred.push(async function(OneSignal) {
        try {
            const perm = await OneSignal.Notifications.requestPermission();
            if (Notification.permission === "granted") {
                localStorage.setItem("push_ativo","true");
                show("step3");
            } else {
                alert("Para continuar, haz clic en el candado junto a la URL y permite las Notificaciones.");
            }
        } catch (err) {
            console.error(err);
            alert("Error al activar. Intenta en un navegador normal (Chrome/Safari).");
        }
    });
}

async function salvarNome(){
    const nome = document.getElementById("nomeInput").value;
    if (!nome) return alert("Por favor, escribe tu nombre");

    OneSignalDeferred.push(async (OneSignal) => {
        await OneSignal.login(userId);
    });

    await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users/${userId}.json`,{
        method:"PUT",
        body:JSON.stringify({ user_id:userId, nombre:nome, created_at:Date.now() })
    });

    localStorage.setItem("nome_usuario", nome);
    showMainApp();
}

function showMainApp(){
    document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
    document.getElementById("mainApp").style.display="block";
    document.getElementById("refreshBtn").style.display="block";
    document.getElementById("userGreeting").innerText = "¡Hola, " + localStorage.getItem("nome_usuario") + "!";
    carregarPromos();
}

async function carregarPromos(){
    const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
    const data = await res.json();
    const box = document.getElementById("promoBox");
    const expBox = document.getElementById("expiredBox");
    const expContainer = document.getElementById("expiredContainer");

    box.innerHTML="";
    expBox.innerHTML="";

    if(!data) return;

    const agora = Date.now();
    const ativas = [];
    const expiradas = [];

    Object.values(data).forEach(p => {
        if(p.exp > agora) ativas.push(p);
        else expiradas.push(p);
    });

    // Ordem: Mais recentes primeiro
    ativas.sort((a,b) => b.exp - a.exp);
    expiradas.sort((a,b) => b.exp - a.exp);

    ativas.forEach(p => {
        const div = document.createElement("div");
        div.className="promo-card";
        div.innerHTML = `
            <h3>${p.titulo}</h3>
            <p>${p.desc}</p>
            <a href="https://api.whatsapp.com/send?phone=5219986023759&text=Hola!%20Quiero%20la%20promo:%20${encodeURIComponent(p.titulo)}" class="btn-whats">LO QUIERO</a>
        `;
        box.appendChild(div);
    });

    if(expiradas.length > 0) {
        expContainer.style.display = "block";
        expiradas.slice(0, 3).forEach(p => {
            const div = document.createElement("div");
            div.className="expired-card";
            div.innerHTML = `<b>${p.titulo}</b><br>${p.desc}`;
            expBox.appendChild(div);
        });
    }
}
</script>
</body>
</html>

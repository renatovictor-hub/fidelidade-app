<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uai Sô Fidelidad</title>

<link rel="manifest" href="/manifest.json">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    notifyButton: { enable: false }
  });
});
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

h1 {
  color: #6a0dad;
}

.contador {
  background: #f3e8ff;
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
  color: #6a0dad;
  font-weight: bold;
}

.banner {
  width: 100%;
  border-radius: 15px;
  margin: 15px 0;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.btn-primary {
  background: #6a0dad;
  color: white;
}

.links a {
  display: block;
  margin: 5px;
  color: #6a0dad;
  text-decoration: none;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Programa de Fidelidad</h1>

<!-- FORM USUARIO -->
<div id="formUsuario">

  <h3>👋 Bienvenido</h3>

  <input id="nombreInput" placeholder="Tu nombre completo"
    style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc;">

  <input id="telefonoInput" placeholder="Teléfono (opcional)"
    style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc;">

  <button onclick="guardarUsuario()" class="btn-primary">
    Guardar
  </button>

</div>

<h2 id="bienvenida" style="display:none;"></h2>

<div class="contador">
🔥 +300 clientes ya reciben promociones
</div>

<img src="banner.jpg" class="banner">

<button onclick="instalarApp()" class="btn-primary" id="btnInstalar" style="display:none;">
📲 Instalar App
</button>

<button onclick="activarNotificaciones()" class="btn-primary" id="btnAtivar" style="display:none;">
🔔 Activar Promociones
</button>

<div class="links">
  <a href="https://api.whatsapp.com/send?phone=5219986023759">📲 WhatsApp</a>
  <a href="https://www.instagram.com/fooduaiso">📸 Instagram</a>
  <a href="https://uaisocancun.ola.click/products">📋 Ver menú</a>
</div>

</div>

<script>

// ================= USER ID =================
let userId = localStorage.getItem("user_id");

if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 1000000000);
  localStorage.setItem("user_id", userId);
}

// ================= MOSTRAR NOME =================
let nomeSalvo = localStorage.getItem("nome_usuario");

if (nomeSalvo) {
  document.getElementById("formUsuario").style.display = "none";
  document.getElementById("bienvenida").style.display = "block";
  document.getElementById("bienvenida").innerText = "👋 Bienvenido " + nomeSalvo;
}

// ================= SALVAR USUARIO =================
async function guardarUsuario() {

  const nome = document.getElementById("nombreInput").value;
  const telefone = document.getElementById("telefonoInput").value;

  if (!nome) {
    alert("Ingresa tu nombre");
    return;
  }

  await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json", {
    method: "POST",
    body: JSON.stringify({
      user_id: userId,
      nombre: nome,
      telefono: telefone || "",
      created_at: Date.now()
    })
  });

  localStorage.setItem("nome_usuario", nome);

  document.getElementById("formUsuario").style.display = "none";
  document.getElementById("bienvenida").style.display = "block";
  document.getElementById("bienvenida").innerText = "👋 Bienvenido " + nome;

}

// ================= ONESIGNAL =================
OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.login(userId);

  if (nomeSalvo) {
    await OneSignal.User.addTag("nombre", nomeSalvo);
  }

});

// ================= INSTALAR APP =================
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstalar").style.display = "block";
});

function instalarApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
}

// ================= NOTIFICACOES =================
async function activarNotificaciones() {

  const OneSignal = window.OneSignal;

  await OneSignal.Notifications.requestPermission();

  alert("Promociones activadas 🔔");

  localStorage.setItem("push_ativo", "true");
  document.getElementById("btnAtivar").style.display = "none";

}

window.onload = () => {

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  const jaAtivo = localStorage.getItem("push_ativo");

  if (jaAtivo === "true") {
    document.getElementById("btnAtivar").style.display = "none";
    return;
  }

  if (isStandalone) {
    document.getElementById("btnAtivar").style.display = "block";
  } else {
    document.getElementById("btnInstalar").style.display = "block";
  }

};

</script>

</body>
</html>

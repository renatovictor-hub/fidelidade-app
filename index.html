<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidelidade - @fooduaiso</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          appId: "SEU_APP_ID_AQUI", // <-- COLOQUE SEU APP ID AQUI
        });
      });
    </script>

    <style>
        /* Design Original com suas Cores: Roxo, Amarelo e Branco */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #4b0082; margin: 0; text-align: center; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .header { background-color: #6a1b9a; color: #fff; padding: 30px 20px; border-bottom: 5px solid #fdd835; border-radius: 0 0 20px 20px; }
        .header h1 { margin: 0; font-size: 24px; color: #fdd835; }

        .step { display: none; padding: 20px; }
        .step.active { display: block; }

        .btn-principal { 
            background-color: #fdd835; 
            color: #6a1b9a; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 100%;
            margin-top: 20px;
        }

        /* Estilo dos Cards de Promoção */
        .promo-card { 
            background: #fff; 
            border: 2px solid #6a1b9a; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 20px; 
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .promo-card h3 { margin: 0; color: #6a1b9a; }
        .promo-card p { margin: 10px 0; font-size: 14px; color: #333; }
        
        .btn-whats { 
            background-color: #6a1b9a; 
            color: #fdd835; 
            text-decoration: none; 
            display: block; 
            text-align: center; 
            padding: 10px; 
            border-radius: 10px; 
            font-weight: bold;
        }

        /* Seção de Expiradas */
        .expired-section { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 20px; }
        .expired-card { background: #f5f5f5; border-left: 5px solid #999; padding: 10px; margin-bottom: 10px; text-align: left; opacity: 0.7; }
        .expired-card b { color: #666; font-size: 13px; }

        #promoHeader, #expiredSection { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Uai Só - Fidelidade</h1>
        <p>Sabor Brasileiro em México</p>
    </div>

    <div class="container">
        <div id="step2" class="step active">
            <h2>🎉 Quase lá!</h2>
            <p>Ative as notificações para receber nossas promoções relâmpago de Coxinhas, Pastéis e muito mais!</p>
            <button class="btn-principal" onclick="ativarNotif()">ATIVAR NOTIFICAÇÕES</button>
        </div>

        <div id="step3" class="step">
            <h2 id="promoHeader" style="color: #6a1b9a;">🔥 Promoções de Hoje</h2>
            <div id="promoBox"></div>

            <div id="expiredSection" class="expired-section">
                <h3 style="color: #999;">Últimas Promoções</h3>
                <div id="expiredBox"></div>
            </div>
        </div>
    </div>

    <script>
        // FUNÇÃO DE NOTIFICAÇÃO CORRIGIDA (v16)
        function ativarNotif() {
            OneSignalDeferred.push(function(OneSignal) {
                OneSignal.Notifications.requestPermission().then(function(permission) {
                    if (permission) {
                        mostrarFeed();
                    } else {
                        alert("Por favor, autorize as notificações para continuar!");
                    }
                });
            });
        }

        function mostrarFeed() {
            document.getElementById("step2").classList.remove("active");
            document.getElementById("step3").classList.add("active");
            carregarConteudo();
        }

        // FUNÇÃO DE CONTEÚDO CORRIGIDA (Ordem e Limite de 3)
        async function carregarConteudo() {
            try {
                const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
                const promos = await res.json();
                
                const box = document.getElementById("promoBox");
                const expBox = document.getElementById("expiredBox");

                if (!promos) return;

                const agora = Date.now();
                const ativas = [];
                const expiradas = [];

                Object.keys(promos).forEach(id => {
                    const p = promos[id];
                    p.exp > agora ? ativas.push(p) : expiradas.push(p);
                });

                // 1. ATIVAS (Ordenadas da que vence mais tarde para a mais próxima)
                if (ativas.length > 0) {
                    document.getElementById("promoHeader").style.display = "block";
                    ativas.sort((a, b) => b.exp - a.exp);
                    box.innerHTML = ativas.map(p => `
                        <div class="promo-card">
                            <h3>${p.titulo}</h3>
                            <p>${p.desc}</p>
                            <a href="https://api.whatsapp.com/send?phone=5219986023759&text=Quero%20a%20promo:%20${encodeURIComponent(p.titulo)}" class="btn-whats">EU QUERO!</a>
                        </div>
                    `).join('');
                }

                // 2. EXPIRADAS (Apenas as 3 mais recentes)
                if (expiradas.length > 0) {
                    document.getElementById("expiredSection").style.display = "block";
                    expiradas.sort((a, b) => b.exp - a.exp); // Ordena por data de expiração
                    const as3Ultimas = expiradas.slice(0, 3);

                    expBox.innerHTML = as3Ultimas.map(p => `
                        <div class="expired-card">
                            <b>${p.titulo}</b><br>
                            <small>${p.desc}</small>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Erro:", e); }
        }

        // Verifica se já tem permissão ao carregar
        window.onload = function() {
            OneSignalDeferred.push(function(OneSignal) {
                if (OneSignal.Notifications.hasPermission) {
                    mostrarFeed();
                }
            });
        };
    </script>
</body>
</html>

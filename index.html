<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Uai Sô Fidelidad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        const isInApp = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
        if (isInApp) {
            document.addEventListener("DOMContentLoaded", () => {
                document.body.innerHTML = `
                    <div style="padding:50px;text-align:center;font-family:sans-serif;background:white;height:100vh;">
                        <h2 style="color:#6a0dad">📲 Abrir en Navegador</h2>
                        <p>Para usar la App, toca los tres puntos (...) y abre en Safari o Chrome.</p>
                    </div>`;
            });
        }
    </script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <!-- 🔥 ONESIGNAL CORRIGIDO -->
    <script>
        let OneSignalInstance = null;

        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {

            OneSignalInstance = OneSignal;

            await OneSignal.init({
                appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
                safari_web_id: "web.onesignal.auto",
                notifyButton: { enable: false }
            });

        });
    </script>

    <style>
        :root { --roxo:#6a0dad; --amarelo:#ffcc00; --gradiente:linear-gradient(135deg,#6a0dad,#9b30ff);}
        body { margin:0;font-family:'Segoe UI',Roboto,sans-serif;background:#fff;text-align:center;color:#333;}
        .container { max-width:400px;margin:auto;padding:20px;}

        .header-app { display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
        .logo { width:80px;}
        .btn-refresh { background:none;border:none;color:var(--roxo);font-size:20px;cursor:pointer;}

        .step-box { display:none;padding:25px;border-radius:20px;background:#fff;border:2px solid #eee;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
        .active { display:block;}

        button { width:100%;padding:16px;margin-top:15px;border-radius:12px;border:none;font-weight:bold;}
        .btn-next { background:var(--gradiente);color:#fff;}
        .btn-notif { background:var(--amarelo);color:#000;}

        .promo-card { background:var(--gradiente);color:white;padding:18px;border-radius:18px;margin-bottom:15px;text-align:left;}
    </style>
</head>

<body>
<div class="container">

<div class="header-app">
    <img src="logo.png" class="logo">
    <button onclick="location.reload()" class="btn-refresh" id="refreshBtn" style="display:none;">↻</button>
</div>

<div id="step1" class="step-box">
    <h2>Instalar App</h2>
    <button onclick="instalarApp()" class="btn-next">INSTALAR</button>
</div>

<div id="step2" class="step-box">
    <h2>Activar Notificaciones</h2>
    <button onclick="ativarNotif()" class="btn-notif">ACTIVAR</button>
</div>

<div id="step3" class="step-box">
    <h2>Tu Nombre</h2>
    <input id="nomeInput" placeholder="Nombre" style="width:100%;padding:12px;">
    <button onclick="salvarNome()" class="btn-next">CONTINUAR</button>
</div>

<div id="mainApp" style="display:none;">
    <h2 id="userGreeting"></h2>
    <div id="promoBox"></div>
</div>

</div>

<script>

// ================= USER ID FIXO =================
let userId = localStorage.getItem("user_id");

if (!userId) {
    userId = "user_" + Math.floor(Math.random() * 1000000000);
    localStorage.setItem("user_id", userId);
}

// ================= FLOW =================
window.onload = () => {

    const nome = localStorage.getItem("nome_usuario");
    const push = localStorage.getItem("push_ativo");

    if (nome) showMainApp();
    else if (push) show("step3");
    else show("step1");

};

function show(id){
    document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// ================= INSTALAR =================
function instalarApp(){
    show("step2");
}

// ================= NOTIF CORRIGIDO =================
async function ativarNotif(){

    if (!OneSignalInstance){
        alert("Cargando...");
        return;
    }

    const perm = await OneSignalInstance.Notifications.requestPermission();

    if (perm === "granted"){
        localStorage.setItem("push_ativo","true");
        show("step3");
    } else {
        alert("Permiso denegado");
    }
}

// ================= SALVAR NOME =================
async function salvarNome(){

    const nome = document.getElementById("nomeInput").value;
    if (!nome) return alert("Digite seu nome");

    if (OneSignalInstance){
        await OneSignalInstance.login(userId);
    }

    await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users/${userId}.json`,{
        method:"PUT",
        body:JSON.stringify({
            user_id:userId,
            nombre:nome,
            created_at:Date.now()
        })
    });

    localStorage.setItem("nome_usuario",nome);

    showMainApp();
}

// ================= APP =================
function showMainApp(){

    document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
    document.getElementById("mainApp").style.display="block";
    document.getElementById("refreshBtn").style.display="block";

    document.getElementById("userGreeting").innerText =
        "Hola, " + localStorage.getItem("nome_usuario");

    carregarPromos();
}

// ================= PROMOS =================
async function carregarPromos(){

    const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
    const data = await res.json();

    const box = document.getElementById("promoBox");
    box.innerHTML="";

    if(!data) return;

    Object.values(data).forEach(p=>{

        if(!p.exp) return;

        const restante = p.exp - Date.now();
        if(restante <= 0) return;

        const div = document.createElement("div");
        div.className="promo-card";

        div.innerHTML = `
            <h3>${p.titulo}</h3>
            <p>${p.desc}</p>
        `;

        box.appendChild(div);

    });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Uai Sô Fidelidad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        const isInApp = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
        if (isInApp) {
            document.addEventListener("DOMContentLoaded", () => {
                document.body.innerHTML = `
                    <div style="padding:50px;text-align:center;font-family:sans-serif;background:white;height:100vh;">
                        <h2 style="color:#6a0dad">📲 Abrir en Navegador</h2>
                        <p>Para usar la App, toca los tres puntos <b>(...)</b> y selecciona <b>"Abrir en Safari"</b> o <b>"Abrir en Chrome"</b>.</p>
                    </div>`;
            });
        }
    </script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
          await OneSignal.init({
            appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
            safari_web_id: "web.onesignal.auto",
            notifyButton: { enable: false }
          });
        });
    </script>

    <style>
        :root { --roxo: #6a0dad; --amarelo: #ffcc00; --gradiente: linear-gradient(135deg, #6a0dad, #9b30ff); }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #fff; text-align: center; color: #333; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 400px; margin: auto; padding: 20px; position: relative; }
        
        /* Header Fix */
        .header-app { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .logo { width: 80px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .btn-refresh { background: none; border: none; color: var(--roxo); font-size: 20px; cursor: pointer; width: auto; padding: 10px; margin: 0; }

        /* Funil de Acesso */
        .step-box { display: none; padding: 25px; border-radius: 20px; background: #fefefe; border: 2px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Botões Modernos */
        button { width: 100%; padding: 16px; margin-top: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-next { background: var(--gradiente); color: white; box-shadow: 0 4px 15px rgba(106, 13, 173, 0.3); }
        .btn-notif { background: var(--amarelo); color: var(--roxo); box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        
        /* App Principal */
        .contador { background: #f3e8ff; padding: 12px; border-radius: 12px; margin: 15px 0; color: var(--roxo); font-weight: bold; font-size: 14px; }
        .promo-card { background: var(--gradiente); color: white; padding: 18px; border-radius: 18px; margin-bottom: 15px; text-align: left; box-shadow: 0 6px 15px rgba(106, 13, 173, 0.2); position: relative; overflow: hidden; }
        .btn-wa-promo { background: #25d366; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; font-weight: bold; font-size: 14px; }

        /* Promoções Expiradas */
        .expired-section { margin-top: 30px; opacity: 0.8; text-align: left; }
        .expired-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .expired-card { background: #f8f8f8; color: #777; padding: 15px; border-radius: 15px; margin-bottom: 10px; font-size: 13px; border-left: 4px solid #ccc; }
        
        /* Footer/Redes */
        .footer-links { margin-top: 40px; border-top: 2px solid #f9f9f9; padding-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .footer-links a { padding: 12px; border-radius: 10px; background: #f8f8f8; color: var(--roxo); text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .link-full { grid-column: span 2; background: #f0f0f0 !important; }
    </style>
</head>

<body>
<div class="container">
    
    <div class="header-app">
        <img src="logo.png" class="logo">
        <button onclick="location.reload()" class="btn-refresh" id="refreshBtn" style="display:none;"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="step1" class="step-box">
        <h2 style="color:var(--roxo)">¡Bienvenido! 🇧🇷</h2>
        <p>Instala nuestra App oficial para acceder a las promociones exclusivas.</p>
        <button onclick="instalarApp()" class="btn-next"><i class="fas fa-mobile-alt"></i> INSTALAR APP</button>
    </div>

    <div id="step2" class="step-box">
        <h2 style="color:var(--roxo)">Paso 2: Alertas 🔔</h2>
        <p>Activa

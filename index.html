<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Uai Sô Fidelidad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        const isInApp = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
        if (isInApp) {
            document.addEventListener("DOMContentLoaded", () => {
                document.body.innerHTML = `
                    <div style="padding:50px;text-align:center;font-family:sans-serif;background:white;height:100vh;">
                        <h2 style="color:#6a0dad">📲 Abrir en Navegador</h2>
                        <p>Para instalar la App y recibir premios, toca los tres puntos <b>(...)</b> y selecciona <b>"Abrir en Safari"</b> o <b>"Abrir en Chrome"</b>.</p>
                    </div>`;
            });
        }
    </script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
          await OneSignal.init({
            appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
            safari_web_id: "web.onesignal.auto",
            notifyButton: { enable: false }
          });
        });
    </script>

    <style>
        :root { --roxo: #6a0dad; --amarelo: #ffcc00; }
        body { margin: 0; font-family: Arial; background: #fff; text-align: center; }
        .container { max-width: 400px; margin: auto; padding: 20px; }
        .logo { width: 120px; margin: 10px auto; }
        
        /* Estilos do Funil */
        .step-box { display: none; padding: 20px; border-radius: 20px; background: #f9f9f9; border: 2px dashed var(--roxo); margin-bottom: 20px; }
        .active { display: block; }
        
        /* Botões */
        button { width: 100%; padding: 18px; margin-top: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-next { background: var(--roxo); color: white; }
        .btn-notif { background: var(--amarelo); color: var(--roxo); }
        
        /* App Principal */
        .contador { background: #f3e8ff; padding: 10px; border-radius: 10px; margin: 10px 0; color: var(--roxo); font-weight: bold; }
        .promo-card { background: linear-gradient(135deg, var(--roxo), #8a2be2); color: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; text-align: left; }
        .btn-wa-promo { background: #25d366; color: white; padding: 10px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; }
        
        /* Footer Links (Redes Sociais) */
        .footer-links { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .footer-links a { display: block; margin: 12px; color: var(--roxo); text-decoration: none; font-weight: bold; font-size: 16px; }
    </style>
</head>

<body>
<div class="container">
    <img src="logo.png" class="logo">

    <div id="step1" class="step-box">
        <h2 style="color:var(--roxo)">Paso 1: Instalar 📲</h2>
        <p>Instala nuestra App para desbloquear beneficios exclusivos.</p>
        <button onclick="instalarApp()" class="btn-next">INSTALAR AHORA</button>
    </div>

    <div id="step2" class="step-box">
        <h2 style="color:var(--roxo)">Paso 2: Alertas 🔔</h2>
        <p>Activa las notificaciones para recibir promos relámpago.</p>
        <button onclick="ativarNotif()" class="btn-notif">ACTIVAR ALERTAS</button>
    </div>

    <div id="step3" class="step-box">
        <h2 style="color:var(--roxo)">Paso 3: Identificación 👤</h2>
        <p>¿Cómo te llamas, CapiLover?</p>
        <input id="nomeInput" placeholder="Tu nombre" style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box;">
        <button onclick="salvarNome()" class="btn-next">ENTRAR AL APP</button>
    </div>

    <div id="mainApp" style="display:none;">
        <h1 id="userGreeting" style="color:var(--roxo)">Uai Sô</h1>
        <div class="contador" id="countDiv">🔥 +300 clientes conectados</div>
        <img src="banner.jpg" style="width:100%; border-radius:15px; margin:10px 0;">
        
        <h3 id="promoHeader" style="color:var(--roxo); display:none;">🔥 PROMOS ACTIVAS</h3>
        <div id="promoBox"></div>

        <div class="footer-links">
            <a href="https://api.whatsapp.com/send?phone=5219986023759&text=Hola%20soy%20Capi%20Lover!"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://www.instagram.com/fooduaiso"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://uaisocancun.ola.click/products"><i class="fas fa-utensils"></i> Ver menú</a>
        </div>
    </div>
</div>

<script>
    let deferredPrompt;
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

    // Gerenciador de Estados
    window.onload = () => {
        if (localStorage.getItem("nome_usuario")) {
            showMainApp();
        } else if (isStandalone) {
            if (localStorage.getItem("push_ativo")) {
                document.getElementById("step3").classList.add("active");
            } else {
                document.getElementById("step2").classList.add("active");
            }
        } else {
            document.getElementById("step1").classList.add("active");
        }
    };

    // Lógica Passo 1: Instalação
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    function instalarApp() {
        if (isIOS) {
            alert("Toca 'Compartir' ⬆️ y luego 'Agregar a pantalla de inicio' 📲");
        } else if (deferredPrompt) {
            deferredPrompt.prompt();
        } else {
            alert("Busca la opción 'Instalar App' en el menú de tu navegador.");
        }
    }

    // Lógica Passo 2: Notificações
    async function ativarNotif() {
        await window.OneSignal.Notifications.requestPermission();
        localStorage.setItem("push_ativo", "true");
        document.getElementById("step2").classList.remove("active");
        document.getElementById("step3").classList.add("active");
    }

    // Lógica Passo 3: Cadastro
    async function salvarNome() {
        const nome = document.getElementById("nomeInput").value;
        if (!nome) return alert("Dinos tu nombre");
        
        await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json", {
            method: "POST",
            body: JSON.stringify({ nombre: nome, created_at: Date.now() })
        });

        localStorage.setItem("nome_usuario", nome);
        showMainApp();
    }

    // Mostrar o App Principal
    function showMainApp() {
        document.querySelectorAll('.step-box').forEach(el => el.classList.remove('active'));
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("userGreeting").innerText = "👋 Hola, " + localStorage.getItem("nome_usuario");
        carregarPromos();
        atualizarContador();
    }

    async function atualizarContador() {
        const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json");
        const data = await res.json();
        const total = data ? Object.keys(data).length : 0;
        document.getElementById("countDiv").innerText = `🔥 +${300 + total} clientes conectados`;
    }

    async function carregarPromos() {
        const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
        const promos = await res.json();
        if (!promos) return;
        const box = document.getElementById("promoBox");
        const header = document.getElementById("promoHeader");
        const agora = Date.now();
        
        Object.keys(promos).forEach(id => {
            const p = promos[id];
            if (p.exp > agora) {
                header.style.display = "block";
                const msg = encodeURIComponent(`Soy Capilover quiero la promo exclusiva: ${p.titulo}`);
                const card = document.createElement("div");
                card.className = "promo-card";
                card.innerHTML = `
                    <h3>${p.titulo}</h3>
                    <p>${p.desc}</p>
                    <a href="https://api.whatsapp.com/send?phone=5219986023759&text=${msg}" class="btn-wa-promo">
                        <i class="fab fa-whatsapp"></i> Yo Quiero
                    </a>`;
                box.appendChild(card);
            }
        });
    }
</script>
</body>
</html>

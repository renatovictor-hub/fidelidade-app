<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fidelidad Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>
// ==============================
// ONESIGNAL
// ==============================
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    safari_web_id: "web.onesignal.auto",
    notifyButton: { enable: false }
  });
});

// ==============================
// PROMOS MULTIPLAS + TIMER REAL
// ==============================
async function carregarPromocao() {

  const urlParams = new URLSearchParams(window.location.search);
  const titulo = urlParams.get("promo");
  const descricao = urlParams.get("desc");
  const tempo = urlParams.get("tempo"); // AGORA EM SEGUNDOS

  const dbUrl = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promocoes.json";

  // SALVAR NOVA PROMO VIA LINK/PUSH
  if (titulo && descricao) {

    const agora = Date.now();
    const duracao = tempo ? parseInt(tempo) * 1000 : 60000; // default 1 min

    const novaPromo = {
      titulo,
      descricao,
      criadoEm: agora,
      expiraEm: agora + duracao
    };

    await fetch(dbUrl, {
      method: "POST",
      body: JSON.stringify(novaPromo)
    });
  }

  // CARREGAR TODAS PROMOS
  const res = await fetch(dbUrl);
  const promos = await res.json();

  const container = document.getElementById("promoBox");
  container.innerHTML = "";

  if (!promos) return;

  const agora = Date.now();

  Object.keys(promos).forEach(id => {

    const p = promos[id];

    if (p.expiraEm < agora) return;

    const div = document.createElement("div");
    div.className = "promo-card";

    div.innerHTML = `
      <h3>${p.titulo}</h3>
      <p>${p.descricao}</p>
      <div class="timer" id="timer-${id}"></div>
    `;

    container.appendChild(div);

    const timerEl = div.querySelector(`#timer-${id}`);

    function atualizarTimer() {
      const agora = Date.now();
      const restante = p.expiraEm - agora;

      if (restante <= 0) {
        div.remove();
        return;
      }

      const totalSeg = Math.floor(restante / 1000);
      const h = Math.floor(totalSeg / 3600);
      const m = Math.floor((totalSeg % 3600) / 60);
      const s = totalSeg % 60;

      timerEl.innerText = `⏳ ${h}h ${m}m ${s}s`;
    }

    atualizarTimer();
    setInterval(atualizarTimer, 1000);
  });

  if (container.innerHTML !== "") {
    container.style.display = "block";
  }
}

// ==============================
// CONTADOR FIREBASE
// ==============================
async function carregarContador() {
  const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/contador.json");
  const total = await res.json();
  document.getElementById("contador").innerText = total || 300;
}

async function aumentarContador() {
  const url = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com/contador.json";
  const res = await fetch(url);
  let total = await res.json();

  total = (total || 300) + 1;

  await fetch(url, {
    method: "PUT",
    body: JSON.stringify(total)
  });

  document.getElementById("contador").innerText = total;
}

// ==============================
// ATIVAR NOTIFICAÇÃO
// ==============================
async function ativarNotificacoes() {
  const OneSignal = window.OneSignal;

  await OneSignal.Notifications.requestPermission();

  setTimeout(async () => {
    const subId = await OneSignal.User.PushSubscription.id;

    if (subId) {
      await aumentarContador();
      alert("¡Promociones activadas! 🔔");
      localStorage.setItem("push_ativo", "true");
      document.getElementById("btnAtivar").style.display = "none";
    } else {
      alert("Error al activar 😢");
    }
  }, 2000);
}

// ==============================
// INSTALAÇÃO
// ==============================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstalar").style.display = "block";
});

function instalarApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  } else {
    alert("En iPhone: usar 'Agregar a pantalla de inicio'");
  }
}

// ==============================
// INIT
// ==============================
window.onload = () => {
  carregarContador();
  carregarPromocao();

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  const jaAtivo = localStorage.getItem("push_ativo");

  if (!isStandalone) {
    document.getElementById("btnInstalar").style.display = "block";
  } else if (jaAtivo !== "true") {
    document.getElementById("btnAtivar").style.display = "block";
  }
};
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

h1 {
  color: #6a0dad;
}

.contador {
  background: #f3e8ff;
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
  color: #6a0dad;
  font-weight: bold;
}

.banner {
  width: 100%;
  border-radius: 15px;
}

.promo-card {
  background: linear-gradient(135deg, #6a0dad, #9b30ff);
  color: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  text-align: left;
}

.timer {
  background: rgba(255,255,255,0.2);
  padding: 5px;
  border-radius: 8px;
  margin-top: 8px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  background: #6a0dad;
  color: white;
}

.links a {
  display: block;
  margin: 5px;
  color: #6a0dad;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Programa de Fidelidad</h1>
<p>Recibe promociones y platos del día</p>

<div class="contador">
🔥 <span id="contador">...</span> clientes ya reciben promociones
</div>

<img src="banner.jpg" class="banner">

<div id="promoBox" style="display:none;"></div>

<button id="btnInstalar" onclick="instalarApp()" style="display:none;">
📲 Instalar App
</button>

<button id="btnAtivar" onclick="ativarNotificacoes()" style="display:none;">
🔔 Activar Promociones
</button>

<div class="links">
<a href="https://api.whatsapp.com/send?phone=5219986023759">WhatsApp</a>
<a href="https://www.instagram.com/fooduaiso">Instagram</a>
<a href="https://uaisocancun.ola.click/products">Ver menú</a>
</div>

</div>

</body>
</html>

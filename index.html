<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Uai Sô Fidelidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
let OneSignalInstance = null;
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OS) {
  OneSignalInstance = OS;
  await OS.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    notifyButton: { enable: false }
  });
});
</script>

<style>
:root { 
    --roxo: #6a0dad; 
    --amarelo: #ffcc00; 
    --gradiente: linear-gradient(135deg, #6a0dad, #9b30ff);
    --branco: #ffffff;
}

body { margin:0; font-family:'Segoe UI', Roboto, sans-serif; background:#f9f9f9; text-align:center; color: #333; }
.container { max-width:400px; margin:auto; padding:20px; min-height:100vh; }

/* Header & Logo */
.header-app { padding: 15px 0; }
.logo { width: 100px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

/* Boxes de Passos */
.step-box { display:none; padding:30px 20px; border-radius:25px; background:var(--branco); border:1px solid #eee; box-shadow:0 10px 25px rgba(0,0,0,0.05); margin-top:20px; }
.active { display:block !important; }

/* Botões Modernos */
button { width:100%; padding:16px; margin-top:15px; border-radius:14px; border:none; font-weight:bold; font-size:16px; cursor:pointer; transition: 0.3s; }
.btn-next { background:var(--gradiente); color:var(--branco); box-shadow: 0 4px 15px rgba(106, 13, 173, 0.3); }
.btn-notif { background:var(--amarelo); color: #000; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }

/* Menu Superior */
.action-menu { display: flex; gap: 10px; margin-bottom: 20px; }
.btn-small { flex: 1; padding: 10px; border-radius: 10px; font-size: 12px; background: #eee; text-decoration: none; color: var(--roxo); font-weight: bold; border: 1px solid #ddd; }

/* Promos */
.section-title { text-align: left; font-size: 18px; font-weight: bold; color: var(--roxo); margin: 20px 0 10px 5px; display: flex; align-items: center; gap: 8px; }

.promo-card { background:var(--gradiente); color:var(--branco); padding:20px; border-radius:22px; margin-bottom:20px; text-align:left; box-shadow: 0 8px 20px rgba(106, 13, 173, 0.2); }

.timer-box { background: rgba(255, 255, 255, 0.2); display: inline-flex; padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; margin-bottom: 15px; }

.btn-wa-card { background: #25d366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; font-weight: bold; }

.expired-card { background:#f0f0f0; color:#888; padding:15px; border-radius:15px; margin-bottom:10px; text-align:left; border-left: 4px solid #ccc; }

.ios-guide { display:none; background:#f4f4f4; padding:20px; border-radius:20px; margin-top:15px; text-align:left; font-size:14px; border: 1px dashed var(--roxo); }
</style>
</head>

<body>

<div class="container">
    <div class="header-app">
        <img src="logo.png" class="logo">
    </div>

    <div id="stepInstall" class="step-box">
        <h2 style="color:var(--roxo)">¡Bienvenido!</h2>
        <p id="installMsg">Instala nuestra App para acceder a promociones exclusivas.</p>
        <button id="btnAndroid" class="btn-next" style="display:none;" onclick="instalar()">INSTALAR APP</button>
        <div id="iosGuide" class="ios-guide">
            1. Toca el botón Compartir<br>
            2. "Agregar a inicio"<br>
            3. Abre la App
        </div>
    </div>

    <div id="stepNotif" class="step-box">
        <h2 style="color:var(--roxo)">Alertas Activas</h2>
        <button onclick="ativarNotif()" class="btn-notif">ACTIVAR NOTIFICACIONES</button>
    </div>

    <div id="stepNome" class="step-box">
        <h2 style="color:var(--roxo)">¿Cómo te llamas?</h2>
        <input id="nomeInput" placeholder="Tu nombre aquí..." style="width:100%; padding:15px; border-radius:12px;">
        <button onclick="salvarNome()" class="btn-next">EMPEZAR</button>
    </div>

    <div id="mainApp" style="display:none; text-align:left;">
        <div class="action-menu">
            <a href="https://instagram.com/fooduaiso" target="_blank" class="btn-small">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="#" class="btn-small">
                <i class="fas fa-utensils"></i> Menú
            </a>
        </div>

        <h2 id="greeting" style="color: var(--roxo);"></h2>
        <p style="color:#666;">¡Qué bueno verte de nuevo!</p>

        <img src="banner.jpg" style="width:100%; border-radius:20px; margin-bottom:10px;">

        <!-- CONTADOR -->
        <div id="contadorUsers" style="
            background:#f3e8ff;
            padding:12px;
            border-radius:12px;
            margin:10px 0 20px 0;
            color:#6a0dad;
            font-weight:bold;
            font-size:14px;
        ">
            🔥 Cargando clientes...
        </div>

        <div class="section-title">
            🔥 Promociones Activas
        </div>

        <div id="promoBox"></div>

        <div id="expiredSection" style="display:none;">
            <div class="section-title" style="color:#999;">Anteriores</div>
            <div id="expiredBox"></div>
        </div>
    </div>
</div>

<script>
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
let deferredPrompt;

let uid = localStorage.getItem("uid");
if (!uid) {
    uid = "user_" + Math.floor(Math.random() * 1e9);
    localStorage.setItem("uid", uid);
}

window.addEventListener("beforeinstallprompt", (e)=>{
    e.preventDefault();
    deferredPrompt = e;
    if (!isIOS) document.getElementById("btnAndroid").style.display = "block";
});

async function instalar(){
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
}

window.onload = () => {
    const nome = localStorage.getItem("nome");
    const push = localStorage.getItem("push");

    if (nome) return abrirApp();

    if (!isStandalone) {
        show("stepInstall");
        if (isIOS) document.getElementById("iosGuide").style.display = "block";
        return;
    }

    if (!push) return show("stepNotif");
    show("stepNome");
};

async function ativarNotif(){
    if (!isStandalone) return alert("Instala primero la app");

    const perm = await OneSignalInstance.Notifications.requestPermission();
    if (Notification.permission === "granted") {
        localStorage.setItem("push","true");
        show("stepNome");
    }
}

async function salvarNome(){
    const nome = document.getElementById("nomeInput").value;
    if (!nome) return;

    if(OneSignalInstance) {
        await OneSignalInstance.login(uid);
    }

    localStorage.setItem("nome", nome);
    abrirApp();
}

function abrirApp(){
    document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
    document.getElementById("mainApp").style.display="block";
    document.getElementById("greeting").innerText = "Hola, " + localStorage.getItem("nome");

    carregar();
    atualizarContador();
}

async function atualizarContador(){
    const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json");
    const data = await res.json();

    const total = data ? Object.keys(data).length : 0;
    animarContador(300 + total);
}

function animarContador(final){
    let atual = 300;
    const el = document.getElementById("contadorUsers");

    const i = setInterval(()=>{
        atual += Math.ceil((final - atual)/10);
        el.innerHTML = `🔥 +${atual} clientes conectados`;
        if(atual>=final) clearInterval(i);
    },50);
}

async function carregar(){
    const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
    const data = await res.json();
    const box = document.getElementById("promoBox");
    const exp = document.getElementById("expiredBox");

    box.innerHTML=""; exp.innerHTML="";
    if(!data) return;

    const now = Date.now();
    const lista = Object.values(data).sort((a,b) => b.exp - a.exp);
    let expCount = 0;

    lista.forEach(p => {
        if(p.exp > now){
            const card = document.createElement("div");
            card.className = "promo-card";
            const id = "t"+Math.random();

            card.innerHTML = `
                <div class="timer-box"><span id="${id}"></span></div>
                <h3>${p.titulo}</h3>
                <p>${p.desc}</p>
                <a href="#" class="btn-wa-card">PEDIR AHORA</a>
            `;
            box.appendChild(card);
            iniciarContador(p.exp, id);
        } else if (expCount < 3) {
            document.getElementById("expiredSection").style.display = "block";
            const div = document.createElement("div");
            div.className = "expired-card";
            div.innerHTML = `<b>${p.titulo}</b>`;
            exp.appendChild(div);
            expCount++;
        }
    });
}

function iniciarContador(ts, id){
    setInterval(()=>{
        const diff = ts - Date.now();
        if(diff <= 0) return document.getElementById(id).innerText="Expirada";
        const m = Math.floor(diff/60000);
        const s = Math.floor((diff%60000)/1000);
        document.getElementById(id).innerText = `${m}m ${s}s`;
    },1000);
}

function show(id){
    document.querySelectorAll(".step-box").forEach(e=>e.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>

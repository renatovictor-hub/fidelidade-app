<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Uai Sô Fidelidad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
let OneSignalInstance = null;

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  OneSignalInstance = OneSignal;

  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    notifyButton: { enable: false }
  });
});
</script>

<style>
:root {
  --roxo:#6a0dad;
  --amarelo:#ffcc00;
  --gradiente:linear-gradient(135deg,#6a0dad,#9b30ff);
}

body { margin:0;font-family:sans-serif;background:#fff;}
.container { max-width:400px;margin:auto;padding:20px;}

.step { display:none;padding:20px;border-radius:15px;border:1px solid #eee;margin-top:20px;}
.active { display:block; }

button { width:100%;padding:15px;border:none;border-radius:10px;font-weight:bold;margin-top:15px;}
.btn1 { background:var(--gradiente);color:#fff; }
.btn2 { background:var(--amarelo); }

.card { background:var(--gradiente);color:#fff;padding:15px;border-radius:15px;margin-top:10px;}
.banner { width:100%;border-radius:15px;margin:10px 0;}
</style>

</head>

<body>

<div class="container">

<h2 style="color:#6a0dad">Uai Sô</h2>

<!-- STEP INSTALL -->
<div id="installStep" class="step">
  <h3>Instalar App</h3>

  <div id="androidInstall">
    <button onclick="instalar()" class="btn1">INSTALAR APP</button>
  </div>

  <div id="iosInstall" style="display:none;">
    <p>📲 Para instalar:</p>
    <p>1. Toque en el botón compartir ⬆️</p>
    <p>2. Seleccione "Agregar a pantalla de inicio"</p>
  </div>
</div>

<!-- STEP NOTIF -->
<div id="notifStep" class="step">
  <h3>Ativar Notificações</h3>
  <button onclick="ativarNotif()" class="btn2">ATIVAR ALERTAS</button>
</div>

<!-- STEP NOME -->
<div id="nomeStep" class="step">
  <input id="nome" placeholder="Tu nombre">
  <button onclick="salvar()" class="btn1">CONTINUAR</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h2 id="hello"></h2>
  <img src="banner.jpg" class="banner">
  <div id="promos"></div>
</div>

</div>

<script>

// ===== DETECÇÃO =====
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

// ===== USER =====
let userId = localStorage.getItem("uid") || "user_" + Math.floor(Math.random()*1e9);
localStorage.setItem("uid", userId);

// ===== INSTALL =====
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

// ===== FLOW =====
window.onload = () => {
  const nome = localStorage.getItem("nome");
  const push = localStorage.getItem("push_ativo");

  if (nome) return abrirApp();

  // iPhone
  if (isIOS) {
    if (!isStandalone) {
      document.getElementById("iosInstall").style.display = "block";
      show("installStep");
      return;
    }
  }

  // Android
  if (!isStandalone) {
    show("installStep");
    return;
  }

  if (!push) return show("notifStep");

  show("nomeStep");
};

// ===== INSTALAR ANDROID =====
async function instalar(){
  if (!deferredPrompt) {
    alert("Instalación no disponible todavía.");
    return;
  }

  deferredPrompt.prompt();

  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    // espera instalar
  }
}

// Detecta instalação real
window.addEventListener('appinstalled', () => {
  show("notifStep");
});

// ===== NOTIF =====
async function ativarNotif(){
  await OneSignalInstance.Notifications.requestPermission();

  if(Notification.permission==="granted"){
    localStorage.setItem("push_ativo","true");
    show("nomeStep");
  }
}

// ===== SALVAR =====
async function salvar(){
  const nome = document.getElementById("nome").value;
  if(!nome) return alert("Escribe tu nombre");

  await OneSignalInstance.login(userId);
  await OneSignalInstance.User.addTag("nome", nome);

  await fetch(`https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users/${userId}.json`,{
    method:"PUT",
    body:JSON.stringify({nome,user_id:userId})
  });

  localStorage.setItem("nome", nome);
  abrirApp();
}

// ===== APP =====
function abrirApp(){
  document.querySelectorAll(".step").forEach(e=>e.style.display="none");
  document.getElementById("app").style.display="block";
  document.getElementById("hello").innerText="Hola "+localStorage.getItem("nome");
  carregar();
}

// ===== PROMOS =====
async function carregar(){
  const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promos.json");
  const data = await res.json();

  const box = document.getElementById("promos");
  box.innerHTML="";

  if(!data) return;

  Object.values(data).forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<b>${p.titulo}</b><br>${p.desc}`;
    box.appendChild(div);
  });
}

// ===== UTILS =====
function show(id){
  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>

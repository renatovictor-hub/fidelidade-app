<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fidelidade Restaurante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {

      await OneSignal.init({
        appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
        safari_web_id: "web.onesignal.auto", // 🔥 ESSENCIAL PARA IPHONE
        notifyButton: {
          enable: true
        },
        allowLocalhostAsSecureOrigin: true
      });

      console.log("OneSignal carregado");

      // força tentativa no iPhone
      setTimeout(async () => {
        try {
          const permission = await OneSignal.Notifications.permission;
          console.log("Permissão atual:", permission);

          if (permission !== "granted") {
            await OneSignal.Notifications.requestPermission();
          }
        } catch (e) {
          console.log("Erro ao pedir permissão:", e);
        }
      }, 3000);

    });
  </script>
</head>

<body style="text-align:center; font-family:sans-serif; padding:30px;">

<h1>🍽️ Cartão Fidelidade</h1>

<p>Ganhe promoções e pratos do dia!</p>

<p style="margin-top:20px;">
Ative as notificações para receber promoções exclusivas 🔔
</p>

</body>
</html>

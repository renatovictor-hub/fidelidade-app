<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fidelidad Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>
// ==============================
// DETECÇÃO
// ==============================
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isInAppBrowser = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);

// ==============================
// OVERLAY iPhone (WhatsApp)
// ==============================
if (isIOS && isInAppBrowser) {
  document.addEventListener("DOMContentLoaded", function() {

    const overlay = document.createElement("div");

    overlay.innerHTML = `
      <div style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:white;
        z-index:9999;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        padding:30px;
        text-align:center;
        font-family:sans-serif;
      ">
        <h2>📲 Abrir en Safari</h2>
        <p>Para activar promociones, abre esta página en Safari</p>

        <button onclick="abrirSafari()" style="
          padding:15px;
          font-size:18px;
          background:#6a0dad;
          color:white;
          border:none;
          border-radius:10px;
        ">
          👉 Abrir en Safari
        </button>

        <p style="font-size:14px; color:gray; margin-top:15px;">
          Si no funciona:<br>
          toca (…) → "Abrir en Safari"
        </p>
      </div>
    `;

    document.body.appendChild(overlay);
  });

  function abrirSafari() {
    window.location.href = window.location.href;
  }
}

// ==============================
// ONESIGNAL
// ==============================
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    safari_web_id: "web.onesignal.auto",
    notifyButton: { enable: false }
  });
});

// ==============================
// CONTADOR FIREBASE
// ==============================
async function carregarContador() {
  const res = await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/contador.json");
  const total = await res.json();
  document.getElementById("contador").innerText = total || 300;
}

async function aumentarContador() {
  const url = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com/contador.json";
  const res = await fetch(url);
  let total = await res.json();

  total = (total || 300) + 1;

  await fetch(url, {
    method: "PUT",
    body: JSON.stringify(total)
  });

  document.getElementById("contador").innerText = total;
}

// ==============================
// PROMOÇÕES MULTIPLAS COM TIMER
// ==============================
async function carregarPromocao() {

  const urlParams = new URLSearchParams(window.location.search);
  const titulo = urlParams.get("promo");
  const descricao = urlParams.get("desc");
  const tempo = urlParams.get("tempo"); // minutos

  const dbUrl = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promocoes.json";

  // 🔥 SE VEIO DO PUSH → SALVA NOVA PROMO
  if (titulo && descricao) {

    const agora = Date.now();
    const duracao = tempo ? parseInt(tempo) * 60000 : 3600000; // default 1h

    const novaPromo = {
      titulo: titulo,
      descricao: descricao,
      criadoEm: agora,
      expiraEm: agora + duracao
    };

    await fetch(dbUrl, {
      method: "POST",
      body: JSON.stringify(novaPromo)
    });
  }

  // 🔥 CARREGA TODAS PROMOS
  const res = await fetch(dbUrl);
  const promos = await res.json();

  const container = document.getElementById("promoBox");
  container.innerHTML = "";

  const agora = Date.now();

  if (!promos) return;

  Object.keys(promos).forEach(id => {

    const p = promos[id];

    // ignora expiradas
    if (p.expiraEm < agora) return;

    const restante = p.expiraEm - agora;

    const minutos = Math.floor(restante / 60000);
    const horas = Math.floor(minutos / 60);
    const mins = minutos % 60;

    const div = document.createElement("div");

    div.style = `
      background:#fff3cd;
      padding:15px;
      border-radius:12px;
      margin-top:10px;
    `;

    div.innerHTML = `
      <h3>${p.titulo}</h3>
      <p>${p.descricao}</p>
      <p style="color:red; font-weight:bold;">
        ⏳ Termina en ${horas}h ${mins}m
      </p>
    `;

    container.appendChild(div);

  });

  // mostra container se tiver promo
  if (container.innerHTML !== "") {
    container.style.display = "block";
  }
}

  // CARREGA DO BANCO
  const res = await fetch(dbUrl);
  const promo = await res.json();

  if (promo && promo.ativo) {

    document.getElementById("promoBox").style.display = "block";
    document.getElementById("promoTitulo").innerText = promo.titulo;
    document.getElementById("promoDescricao").innerText = promo.descricao;

  }
}

// ==============================
// ATIVAR NOTIFICAÇÃO
// ==============================
async function ativarNotificacoes() {
  const OneSignal = window.OneSignal;

  await OneSignal.Notifications.requestPermission();

  setTimeout(async () => {
    const subId = await OneSignal.User.PushSubscription.id;

    if (subId) {

      await aumentarContador();

      alert("¡Promociones activadas! 🔔");

      localStorage.setItem("push_ativo", "true");
      document.getElementById("btnAtivar").style.display = "none";

    } else {
      alert("Error al activar 😢");
    }
  }, 2000);
}

// ==============================
// INSTALAÇÃO
// ==============================
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  document.getElementById("btnInstalar").style.display = "block";
});

function instalarApp() {
  if (isIOS) {
    alert("Toca compartir ⬆️ y luego 'Agregar a pantalla de inicio'");
    return;
  }

  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
}

// ==============================
// CONTROLE UI
// ==============================
window.onload = () => {

  carregarContador();
  carregarPromocao();

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  const jaAtivo = localStorage.getItem("push_ativo");

  if (jaAtivo === "true") {
    document.getElementById("btnAtivar").style.display = "none";
  }

  if (isIOS && !isStandalone) {
    document.getElementById("btnInstalar").style.display = "block";
    return;
  }

  if (!isStandalone) {
    document.getElementById("btnInstalar").style.display = "block";
  } else {
    if (jaAtivo !== "true") {
      document.getElementById("btnAtivar").style.display = "block";
    }
  }
};
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

h1 {
  color: #6a0dad;
}

.contador {
  background: #f3e8ff;
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
  color: #6a0dad;
  font-weight: bold;
}

.banner {
  width: 100%;
  border-radius: 15px;
}

.promo {
  background: #fff3cd;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: #6a0dad;
  color: white;
}

.urgencia {
  color: red;
  margin-top: 10px;
  font-weight: bold;
}

.links a {
  display: block;
  margin: 5px;
  color: #6a0dad;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Programa de Fidelidad</h1>
<p>Recibe promociones y platos del día</p>

<div class="contador">
🔥 <span id="contador">...</span> clientes ya reciben promociones
</div>

<img src="banner.jpg" class="banner">

<!-- PROMOÇÃO -->
<div id="promoBox" style="display:none;"></div>
  <h3 id="promoTitulo"></h3>
  <p id="promoDescricao"></p>
</div>

<button id="btnInstalar" class="btn-primary" onclick="instalarApp()" style="display:none;">
📲 Instalar App
</button>

<button id="btnAtivar" class="btn-primary" onclick="ativarNotificacoes()" style="display:none;">
🔔 Activar Promociones
</button>

<div class="urgencia">
⚡ Promociones desaparecen en pocas horas
</div>

<div class="links">
<a href="https://api.whatsapp.com/send?phone=5219986023759">📲 WhatsApp</a>
<a href="https://www.instagram.com/fooduaiso">📸 Instagram</a>
<a href="https://uaisocancun.ola.click/products">📋 Ver menú</a>
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fidelidad Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>
// ==============================
// ONESIGNAL
// ==============================
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
    safari_web_id: "web.onesignal.auto",
    notifyButton: { enable: false }
  });
});

// ==============================
// PROMOS COM CONTROLE (SEM DUPLICAR)
// ==============================
async function carregarPromocao() {

  const urlParams = new URLSearchParams(window.location.search);
  const titulo = urlParams.get("promo");
  const descricao = urlParams.get("desc");
  const tempo = urlParams.get("tempo");

  const dbUrl = "https://fidelidade-app-9671c-default-rtdb.firebaseio.com/promocoes.json";

  // 🔥 ID UNICO BASEADO NA PROMO
  const promoId = titulo + "_" + descricao;

  const jaSalvou = sessionStorage.getItem(promoId);

  // SALVAR SÓ UMA VEZ
  if (titulo && descricao && !jaSalvou) {

    const agora = Date.now();
    const duracao = tempo ? parseInt(tempo) * 1000 : 60000;

    const novaPromo = {
      titulo,
      descricao,
      criadoEm: agora,
      expiraEm: agora + duracao
    };

    await fetch(dbUrl, {
      method: "POST",
      body: JSON.stringify(novaPromo)
    });

    sessionStorage.setItem(promoId, "true");

    // LIMPA URL (CRUCIAL)
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  // CARREGAR PROMOS
  const res = await fetch(dbUrl);
  const promos = await res.json();

  const container = document.getElementById("promoBox");
  container.innerHTML = "";

  if (!promos) return;

  const agora = Date.now();

  Object.keys(promos).forEach(id => {

    const p = promos[id];

    if (p.expiraEm < agora) return;

    const div = document.createElement("div");
    div.className = "promo-card";

    div.innerHTML = `
      <h3>${p.titulo}</h3>
      <p>${p.descricao}</p>
      <div class="timer" id="timer-${id}"></div>
    `;

    container.appendChild(div);

    const timerEl = div.querySelector(`#timer-${id}`);

    function atualizarTimer() {
      const restante = p.expiraEm - Date.now();

      if (restante <= 0) {
        div.remove();
        return;
      }

      const totalSeg = Math.floor(restante / 1000);
      const h = Math.floor(totalSeg / 3600);
      const m = Math.floor((totalSeg % 3600) / 60);
      const s = totalSeg % 60;

      timerEl.innerText = `⏳ ${h}h ${m}m ${s}s`;
    }

    atualizarTimer();
    setInterval(atualizarTimer, 1000);
  });

  if (container.innerHTML !== "") {
    container.style.display = "block";
  }
}

// ==============================
// INIT
// ==============================
window.onload = () => {
  carregarPromocao();
};
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

.banner {
  width: 100%;
  border-radius: 15px;
}

.promo-card {
  background: linear-gradient(135deg, #6a0dad, #9b30ff);
  color: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  text-align: left;
}

.timer {
  background: rgba(255,255,255,0.2);
  padding: 5px;
  border-radius: 8px;
  margin-top: 8px;
}

.links {
  margin-top: 20px;
}

.links a {
  display: block;
  margin: 10px;
  font-size: 18px;
  text-decoration: none;
  color: #6a0dad;
}

.links i {
  margin-right: 8px;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Programa de Fidelidad</h1>
<p>Recibe promociones y platos del día</p>

<img src="banner.jpg" class="banner">

<div id="promoBox" style="display:none;"></div>

<div class="links">
<a href="https://api.whatsapp.com/send?phone=5219986023759">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://www.instagram.com/fooduaiso">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="https://uaisocancun.ola.click/products">
<i class="fas fa-utensils"></i> Ver menú
</a>
</div>

</div>
<script>

// ==============================
// GERAR ID ÚNICO
// ==============================
let userId = localStorage.getItem("user_id");

if (!userId) {
  userId = "user_" + Math.floor(Math.random() * 1000000000);
  localStorage.setItem("user_id", userId);
}

// ==============================
// LOGIN ONESIGNAL
// ==============================
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.login(userId);
});

// ==============================
// VERIFICAR SE JÁ FOI SALVO
// ==============================
let jaSalvo = localStorage.getItem("user_saved");

// ==============================
// SALVAR SÓ UMA VEZ
// ==============================
async function salvarUsuario() {

  if (jaSalvo === "true") {
    console.log("Usuario já salvo:", userId);
    return;
  }

  try {

    await fetch("https://fidelidade-app-9671c-default-rtdb.firebaseio.com/users.json", {
      method: "POST",
      body: JSON.stringify({
        user_id: userId,
        created_at: Date.now()
      })
    });

    localStorage.setItem("user_saved", "true");

    console.log("Usuario salvo:", userId);

  } catch (e) {
    console.error("Erro ao salvar:", e);
  }

}

salvarUsuario();

</script>

</body>
</html>

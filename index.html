 <script>
const isInAppBrowser = /FBAN|FBAV|Instagram|WhatsApp/i.test(navigator.userAgent);
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if (isIOS && isInAppBrowser) {

  document.addEventListener("DOMContentLoaded", function() {

    const overlay = document.createElement("div");

    overlay.innerHTML = `
      <div style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:white;
        z-index:9999;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;

        font-family:sans-serif;
      ">
        
        <h2>📲 Abrir en Safari</h2>

        <p>
          Para activar promociones,<br>
          necesitas abrir en Safari
        </p>

        <br>

        <button onclick="abrirSafari()" style="
          padding:15px;
          font-size:18px;
          background:#6a0dad;
          color:white;
          border:none;
          border-radius:10px;
        ">
          👉 Abrir en Safari
        </button>

        <br><br>

        <p style="font-size:14px; color:gray;">
          Si no funciona:<br>
          toca (…) y selecciona<br>
          <b>"Abrir en Safari"</b>
        </p>

      </div>
    `;

    document.body.appendChild(overlay);

  });

  function abrirSafari() {
    window.location.href = window.location.href;
  }
}
</script>  
  <meta charset="UTF-8">
  <title>Fidelidad Restaurante</title>

  <link rel="manifest" href="/manifest.json">

  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
        safari_web_id: "web.onesignal.auto",
        notifyButton: { enable: false }
      });
    });

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

   async function ativarNotificacoes() {
  const OneSignal = window.OneSignal;

  await OneSignal.Notifications.requestPermission();

  setTimeout(async () => {
    const subId = await OneSignal.User.PushSubscription.id;

    if (subId) {
      alert("¡Promociones activadas! 🔔");

      // 🔥 SALVA QUE JÁ ATIVOU
      localStorage.setItem("push_ativo", "true");

      document.getElementById("btnAtivar").style.display = "none";

    } else {
      alert("Error al activar 😢");
    }
  }, 2000);
}

    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById("btnInstalar").style.display = "block";
    });

    function instalarApp() {
      if (isIOS) {
        alert("Toca compartir ⬆️ y luego 'Agregar a pantalla de inicio'");
        return;
      }

      if (deferredPrompt) {
        deferredPrompt.prompt();
      }
    }

  window.onload = () => {

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  const jaAtivo = localStorage.getItem("push_ativo");

  // se já ativou → não mostra botão
  if (jaAtivo === "true") {
    document.getElementById("btnAtivar").style.display = "none";
    return;
  }

  // fluxo normal
  if (isStandalone) {
    document.getElementById("btnAtivar").style.display = "block";
  } else {
    document.getElementById("btnInstalar").style.display = "block";
  }

};
  </script>

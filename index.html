<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fidelidade Restaurante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "10fd0812-370f-408a-9ea5-cbb349f5d635",
        safari_web_id: "web.onesignal.auto",
        notifyButton: {
          enable: false
        }
      });

      console.log("OneSignal pronto");
    });

    // 🔥 BOTÃO MANUAL
    async function ativarNotificacoes() {

      const OneSignal = window.OneSignal;

      try {
        const permission = await OneSignal.Notifications.permission;

        if (permission === "granted") {
          alert("Notificações já estão ativas ✅");
          return;
        }

        await OneSignal.Notifications.requestPermission();

        const newPermission = await OneSignal.Notifications.permission;

        if (newPermission === "granted") {
          alert("Promoções ativadas! 🔔");
        } else {
          alert("Permissão negada 😢");
        }

      } catch (e) {
        alert("Erro ao ativar notificações");
        console.log(e);
      }
    }
  </script>

</head>

<body style="text-align:center; font-family:sans-serif; padding:30px;">

<h1>🍽️ Cartão Fidelidade</h1>

<p>Ganhe promoções e pratos do dia!</p>

<button onclick="ativarNotificacoes()" 
style="padding:15px; font-size:18px; margin-top:20px;">
🔔 Ativar Promoções
</button>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Uai Sô - Disparador Push</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f9f9f9; }
        .card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: #6a0dad; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#6a0dad">🚀 Enviar Notificación</h2>
    <input id="titulo" placeholder="Título da Promoção">
    <textarea id="msg" placeholder="Texto da mensagem..."></textarea>
    <button onclick="enviar()">ENVIAR A TODOS</button>
    <p id="status" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<script>
async function enviar() {
    const status = document.getElementById("status");
    const titulo = document.getElementById("titulo").value;
    const msg = document.getElementById("msg").value;
    
    // A SUA CHAVE QUE VOCÊ ME ENVIOU
    const REST_API_KEY = "os_v2_app_cd6qqerxb5aivhvfzozut5owgubi5l5pvkqutnnclrleqng4gl4y3od5babtsob4nqqggdpkrfpgtyp7cld73giruoufaflvp3rrwtq";
    const APP_ID = "10fd0812-370f-408a-9ea5-cbb349f5d635";

    status.innerText = "Conectando...";

    try {
        const response = await fetch("https://onesignal.com/api/v1/notifications", {
            method: "POST",
            headers: {
                "Content-Type": "application/json; charset=utf-8",
                "Authorization": "Basic " + REST_API_KEY // O "Basic " é obrigatório aqui
            },
            body: JSON.stringify({
                app_id: APP_ID,
                included_segments: ["Total Subscriptions"], // Garante que pega todos os inscritos
                headings: { "en": titulo, "es": titulo },
                contents: { "en": msg, "es": msg },
                isAndroid: true, // Força foco no Android
                android_accent_color: "6A0DAD",
                content_available: true
            })
        });

        const data = await response.json();
        
        if (data.id) {
            status.innerHTML = "✅ ¡Enviado con éxito!<br>ID: " + data.id;
            status.style.color = "green";
        } else {
            status.innerText = "❌ Erro: " + JSON.stringify(data.errors);
            status.style.color = "red";
        }
    } catch (e) {
        status.innerText = "❌ Erro na requisição.";
    }
}
</script>
</body>
</html>

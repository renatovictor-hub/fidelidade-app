<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enviar Promoção</title>
</head>

<body style="text-align:center; font-family:sans-serif; padding:30px;">

<h2>📢 Enviar Promoção</h2>

<input id="titulo" placeholder="Título" style="padding:10px; width:80%"><br><br>
<input id="mensagem" placeholder="Mensagem" style="padding:10px; width:80%"><br><br>

<button onclick="enviar()" style="padding:15px; font-size:18px;">
🚀 Enviar para todos
</button>

<script>
async function enviar(){
  const titulo = document.getElementById("titulo").value;
  const mensagem = document.getElementById("mensagem").value;
  
  if(!titulo || !mensagem) return alert("Preencha tudo!");

  // Chave de API do OneSignal (Pegue em: Settings > Keys & IDs > REST API Key)
  const ONESIGNAL_REST_API_KEY = "os_v2_app_cd6qqerxb5aivhvfzozut5owgubi5l5pvkqutnnclrleqng4gl4y3od5babtsob4nqqggdpkrfpgtyp7cld73giruoufaflvp3rrwtq"; 
  const ONESIGNAL_APP_ID = "10fd0812-370f-408a-9ea5-cbb349f5d635";

  const response = await fetch("https://onesignal.com/api/v1/notifications", {
    method: "POST",
    headers: {
      "Content-Type": "application/json; charset=utf-8",
      "Authorization": `Basic ${ONESIGNAL_REST_API_KEY}`
    },
    body: JSON.stringify({
      app_id: ONESIGNAL_APP_ID,
      included_segments: ["All"], // Envia para todos (Android e iOS)
      headings: { "en": titulo, "es": titulo },
      contents: { "en": mensagem, "es": mensagem },
      android_accent_color: "6A0DAD" // Seu roxo característico
    })
  });

  if (response.ok) {
    alert("🚀 ¡Promoción enviada com sucesso!");
  } else {
    alert("❌ Erro ao enviar. Verifique sua REST API Key.");
  }
}
</script>

</body>
</html>
